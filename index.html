<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZentroPay — Secure Access</title>
    <link rel="icon" type="image/png" href="ei_1777492717837-removebg-preview.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }

        .container {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 2;
        }

        .glass-panel {
            background: rgba(18, 18, 24, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 48px 36px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-image {
            width: 140px;
            height: auto;
            margin: 0 auto 16px auto;
            display: block;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
            transition: transform 0.3s ease;
        }

        .logo-image:hover {
            transform: scale(1.02);
        }

        .tagline {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.35);
            margin-top: 8px;
            font-weight: 500;
        }

        .tabs {
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.4);
            padding: 6px;
            border-radius: 60px;
            margin-bottom: 32px;
            border: 0.5px solid rgba(255,255,255,0.05);
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 0;
            font-size: 14px;
            font-weight: 600;
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            border-radius: 40px;
            transition: 0.3s;
            letter-spacing: 0.5px;
        }

        .tab-btn.active {
            background: linear-gradient(90deg, #1a1a24 0%, #0d0d14 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            border: 0.5px solid rgba(255,255,255,0.08);
        }

        .form-container {
            display: none;
            animation: fadeIn 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .form-container.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 0;
            background: transparent;
            border: none;
            border-bottom: 1.5px solid rgba(255,255,255,0.12);
            font-size: 15px;
            color: white;
            outline: none;
            transition: 0.3s;
            font-weight: 400;
        }

        .input-group input:focus {
            border-bottom-color: #10b981;
        }

        .input-group input::placeholder {
            color: rgba(255,255,255,0.2);
            font-weight: 300;
            font-size: 13px;
        }

        .phone-prefix {
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1.5px solid rgba(255,255,255,0.12);
            padding: 14px 0;
        }
        .phone-prefix span {
            color: rgba(255,255,255,0.6);
            font-weight: 600;
            font-size: 14px;
            background: rgba(255,255,255,0.05);
            padding: 4px 12px;
            border-radius: 40px;
        }
        .phone-prefix input {
            flex: 1;
            background: transparent;
            border: none;
            font-size: 15px;
            color: white;
            outline: none;
        }

        .btn-liquid-premium {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            border: none;
            border-radius: 44px;
            background: linear-gradient(90deg, #1a1a24 0%, #0d0d14 100%);
            color: white;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            border: 0.5px solid rgba(255,255,255,0.1);
        }

        .btn-liquid-premium::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.08), transparent);
            transform: translateX(-100%);
            transition: 0.6s;
        }

        .btn-liquid-premium:hover::after {
            transform: translateX(100%);
        }

        .btn-liquid-premium:hover {
            background: linear-gradient(90deg, #2a2a38 0%, #1a1a24 100%);
            transform: translateY(-1px);
        }

        .btn-liquid-premium:active {
            transform: translateY(0);
        }

        .footer-note {
            text-align: center;
            margin-top: 32px;
            font-size: 10px;
            color: rgba(255,255,255,0.2);
            letter-spacing: 1px;
        }

        .message {
            margin-top: 20px;
            padding: 14px 16px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 500;
            text-align: center;
            backdrop-filter: blur(12px);
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }

        .message.show {
            display: flex;
        }

        .message svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .message.error {
            background: rgba(220, 38, 38, 0.2);
            border: 1px solid rgba(220, 38, 38, 0.4);
            color: #f87171;
        }

        .message.success {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(16, 185, 129, 0.4);
            color: #34d399;
        }

        .message.info {
            background: rgba(245, 158, 11, 0.2);
            border: 1px solid rgba(245, 158, 11, 0.4);
            color: #fbbf24;
        }

        /* Badge Admin */
        .admin-badge {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .verify-container {
            text-align: center;
        }
        .verify-icon {
            font-size: 64px;
            margin-bottom: 24px;
        }
        .verify-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .verify-text {
            color: rgba(255,255,255,0.6);
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .glass-panel { padding: 32px 24px; }
            .logo-image { width: 120px; }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div id="auth-panel">
            <div class="glass-panel">
                <div class="logo-area">
                    <img src="ei_1777492717837-removebg-preview.png" alt="ZentroPay Logo" class="logo-image">
                    <p class="tagline">SECURE PAYMENT GATEWAY</p>
                </div>

                <div class="tabs">
                    <button class="tab-btn active" id="tab-login-btn">⟡ ENTRAR</button>
                    <button class="tab-btn" id="tab-cadastro-btn">⟡ CRIAR</button>
                </div>

                <div id="login-container" class="form-container active">
                    <form id="login-form">
                        <div class="input-group">
                            <label>E-MAIL</label>
                            <input type="email" id="login-email" placeholder="vendedor@zentropay.com" required>
                        </div>
                        <div class="input-group">
                            <label>SENHA</label>
                            <input type="password" id="login-senha" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn-liquid-premium">ACESSAR PAINEL →</button>
                        <div class="message" id="login-message"></div>
                    </form>
                </div>

                <div id="cadastro-container" class="form-container">
                    <form id="cadastro-form">
                        <div class="input-group">
                            <label>NOME COMPLETO</label>
                            <input type="text" id="cadastro-nome" placeholder="Maria Amélia" required>
                        </div>
                        <div class="input-group">
                            <label>E-MAIL</label>
                            <input type="email" id="cadastro-email" placeholder="vendedor@zentropay.com" required>
                        </div>
                        <div class="input-group">
                            <label>NÚMERO DE CELULAR</label>
                            <div class="phone-prefix">
                                <span>+258</span>
                                <input type="tel" id="cadastro-telefone" placeholder="84 123 4567" required>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>SENHA</label>
                            <input type="password" id="cadastro-senha" placeholder="mínimo 6 caracteres" required>
                        </div>
                        <div class="input-group">
                            <label>CONFIRMAR SENHA</label>
                            <input type="password" id="cadastro-confirmar" placeholder="digite novamente" required>
                        </div>
                        <button type="submit" class="btn-liquid-premium">CRIAR CONTA →</button>
                        <div class="message" id="cadastro-message"></div>
                    </form>
                </div>

                <div class="footer-note">
                    <p>✦ ENCRYPTED BY ZENTROPAY SECURE LAYER ✦</p>
                </div>
            </div>
        </div>

        <div id="verify-panel" style="display: none;">
            <div class="glass-panel verify-container">
                <div class="verify-icon">📧</div>
                <div class="verify-title">Verifique seu e-mail</div>
                <div class="verify-text">
                    Enviamos um link de confirmação para <strong id="verify-email"></strong><br>
                    Clique no link para ativar sua conta e acessar o painel.
                </div>
                <button id="resend-btn" class="btn-liquid-premium" style="margin-top: 0;">REENVIAR E-MAIL</button>
                <div class="message" id="verify-message"></div>
                <div class="footer-note" style="margin-top: 24px;">
                    <p>✦ Não recebeu? Verifique sua caixa de spam ✦</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // CONFIGURAÇÃO SUPABASE
            const SUPABASE_URL = "https://pbxufurblxmbzflaiqmh.supabase.co";
            const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBieHVmdXJibHhtYnpmbGFpcW1oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MDY5MjcsImV4cCI6MjA5MzE4MjkyN30.wDSSnT4QWm1HK9dQDcXutyM271Qsg5kmFqQZFytA4pA";

            // ADMIN CREDENTIALS
            const ADMIN_EMAILS = ['blazeryannick@gmail.com', 'vantix.mz@gmail.com'];
            const ADMIN_PASSWORD = 'ZentroPayAdMIN';

            if (typeof supabaseClient === 'undefined') {
                var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
            const supabase = supabaseClient;

            const authPanel = document.getElementById('auth-panel');
            const verifyPanel = document.getElementById('verify-panel');
            const tabLoginBtn = document.getElementById('tab-login-btn');
            const tabCadastroBtn = document.getElementById('tab-cadastro-btn');
            const loginContainer = document.getElementById('login-container');
            const cadastroContainer = document.getElementById('cadastro-container');
            
            let emailParaVerificar = '';
            let verifyInterval = null;

            function showMessage(elementId, message, type) {
                const msgDiv = document.getElementById(elementId);
                if (!msgDiv) return;
                
                let iconSvg = '';
                if (type === 'error') {
                    iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
                } else if (type === 'success') {
                    iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`;
                } else {
                    iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`;
                }
                
                msgDiv.innerHTML = `${iconSvg}<span>${message}</span>`;
                msgDiv.className = `message ${type} show`;
                
                setTimeout(() => {
                    msgDiv.classList.remove('show');
                }, 5000);
            }

            function switchToLogin() {
                tabLoginBtn.classList.add('active');
                tabCadastroBtn.classList.remove('active');
                loginContainer.classList.add('active');
                cadastroContainer.classList.remove('active');
                document.querySelectorAll('.message').forEach(m => m.classList.remove('show'));
            }

            function switchToCadastro() {
                tabCadastroBtn.classList.add('active');
                tabLoginBtn.classList.remove('active');
                cadastroContainer.classList.add('active');
                loginContainer.classList.remove('active');
                document.querySelectorAll('.message').forEach(m => m.classList.remove('show'));
            }

            tabLoginBtn.onclick = switchToLogin;
            tabCadastroBtn.onclick = switchToCadastro;

            async function checkSession() {
                const { data: { session }, error } = await supabase.auth.getSession();
                if (session && !error) {
                    const user = session.user;
                    if (user.email_confirmed_at) {
                        localStorage.setItem('zentropay_session', JSON.stringify({
                            id: user.id,
                            nome: user.user_metadata?.nome || user.email,
                            email: user.email
                        }));
                        
                        // Verificar se é ADMIN
                        if (ADMIN_EMAILS.includes(user.email)) {
                            window.location.href = 'zentroadmin.html';
                        } else {
                            window.location.href = 'dashboard.html';
                        }
                    } else {
                        emailParaVerificar = user.email;
                        document.getElementById('verify-email').innerText = user.email;
                        authPanel.style.display = 'none';
                        verifyPanel.style.display = 'block';
                        startEmailCheck();
                    }
                }
            }

            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('login-email').value.trim();
                const senha = document.getElementById('login-senha').value;

                if (!email || !senha) {
                    showMessage('login-message', 'Preencha todos os campos', 'error');
                    return;
                }

                const btn = e.target.querySelector('button');
                const originalText = btn.innerText;
                btn.innerText = '⏳ AUTENTICANDO...';
                btn.style.opacity = '0.7';

                // VERIFICAÇÃO DE ADMIN LOCAL (antes do Supabase)
                if (ADMIN_EMAILS.includes(email) && senha === ADMIN_PASSWORD) {
                    showMessage('login-message', '✅ Acesso ADMIN concedido! Redirecionando...', 'success');
                    localStorage.setItem('zentropay_session', JSON.stringify({
                        id: 'admin',
                        nome: 'Administrador',
                        email: email,
                        isAdmin: true
                    }));
                    setTimeout(() => {
                        window.location.href = 'zentroadmin.html';
                    }, 1500);
                    btn.innerText = originalText;
                    btn.style.opacity = '1';
                    return;
                }

                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: senha
                });

                if (error) {
                    showMessage('login-message', error.message === 'Invalid login credentials' ? 'E-mail ou senha inválidos' : error.message, 'error');
                    btn.innerText = originalText;
                    btn.style.opacity = '1';
                    return;
                }

                if (data.user) {
                    if (!data.user.email_confirmed_at) {
                        await supabase.auth.resend({ email: email, type: 'signup' });
                        emailParaVerificar = email;
                        document.getElementById('verify-email').innerText = email;
                        authPanel.style.display = 'none';
                        verifyPanel.style.display = 'block';
                        showMessage('verify-message', 'E-mail de confirmação reenviado!', 'success');
                        startEmailCheck();
                    } else {
                        showMessage('login-message', `✅ Bem-vindo, ${data.user.user_metadata?.nome || email}!`, 'success');
                        localStorage.setItem('zentropay_session', JSON.stringify({
                            id: data.user.id,
                            nome: data.user.user_metadata?.nome || email,
                            email: email
                        }));
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 1500);
                    }
                }

                btn.innerText = originalText;
                btn.style.opacity = '1';
            });

            document.getElementById('cadastro-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const nome = document.getElementById('cadastro-nome').value.trim();
                const email = document.getElementById('cadastro-email').value.trim();
                const telefone = document.getElementById('cadastro-telefone').value.trim();
                const senha = document.getElementById('cadastro-senha').value;
                const confirmar = document.getElementById('cadastro-confirmar').value;

                if (!nome || !email || !telefone || !senha || !confirmar) {
                    showMessage('cadastro-message', 'Preencha todos os campos', 'error');
                    return;
                }

                if (senha.length < 6) {
                    showMessage('cadastro-message', 'A senha deve ter no mínimo 6 caracteres', 'error');
                    return;
                }

                if (senha !== confirmar) {
                    showMessage('cadastro-message', 'As senhas não coincidem', 'error');
                    return;
                }

                let telefoneFormatado = telefone.replace(/\D/g, '');
                if (!telefoneFormatado.startsWith('84') && !telefoneFormatado.startsWith('85') && !telefoneFormatado.startsWith('82')) {
                    telefoneFormatado = '84' + telefoneFormatado;
                }

                const btn = e.target.querySelector('button');
                const originalText = btn.innerText;
                btn.innerText = '⏳ CRIANDO CONTA...';
                btn.style.opacity = '0.7';

                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: senha,
                    options: {
                        data: {
                            nome: nome,
                            telefone: '+258' + telefoneFormatado,
                            avatar: nome.charAt(0).toUpperCase()
                        }
                    }
                });

                if (error) {
                    if (error.message.includes('already registered')) {
                        showMessage('cadastro-message', 'Este e-mail já está cadastrado', 'error');
                    } else {
                        showMessage('cadastro-message', error.message, 'error');
                    }
                    btn.innerText = originalText;
                    btn.style.opacity = '1';
                    return;
                }

                if (data.user) {
                    emailParaVerificar = email;
                    document.getElementById('verify-email').innerText = email;
                    showMessage('cadastro-message', '✅ Conta criada! Verifique seu e-mail.', 'success');
                    setTimeout(() => {
                        authPanel.style.display = 'none';
                        verifyPanel.style.display = 'block';
                        startEmailCheck();
                    }, 1500);
                }

                btn.innerText = originalText;
                btn.style.opacity = '1';
            });

            document.getElementById('resend-btn').addEventListener('click', async () => {
                if (!emailParaVerificar) return;
                
                const btn = document.getElementById('resend-btn');
                const originalText = btn.innerText;
                btn.innerHTML = '<span class="spinner"></span> ENVIANDO...';
                btn.disabled = true;

                const { error } = await supabase.auth.resend({
                    email: emailParaVerificar,
                    type: 'signup'
                });

                if (error) {
                    showMessage('verify-message', error.message, 'error');
                } else {
                    showMessage('verify-message', '✅ E-mail reenviado! Verifique sua caixa.', 'success');
                }

                btn.innerText = originalText;
                btn.disabled = false;
            });

            async function checkEmailConfirmation() {
                if (!emailParaVerificar) return;
                
                const { data: { session }, error } = await supabase.auth.getSession();
                if (session && session.user?.email_confirmed_at) {
                    if (verifyInterval) clearInterval(verifyInterval);
                    showMessage('verify-message', '✅ E-mail confirmado! Redirecionando...', 'success');
                    localStorage.setItem('zentropay_session', JSON.stringify({
                        id: session.user.id,
                        nome: session.user.user_metadata?.nome || emailParaVerificar,
                        email: emailParaVerificar
                    }));
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                }
            }

            function startEmailCheck() {
                if (verifyInterval) clearInterval(verifyInterval);
                verifyInterval = setInterval(checkEmailConfirmation, 3000);
            }

            checkSession();
        })();
    </script>
</body>
</html>
