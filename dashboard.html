<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Vantix — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0c;
            font-family: 'Inter', sans-serif;
            color: #fff;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body.light {
            background: #f0f0f0;
            color: #1a1a1a;
        }

        body.light .navbar,
        body.light .card,
        body.light .pedidos-section,
        body.light .sidebar {
            background: rgba(255,255,255,0.9);
            border-color: rgba(0,0,0,0.08);
        }

        body.light .card-metrica {
            background: rgba(255,255,255,0.8);
        }

        body.light .pedido-card {
            background: rgba(0,0,0,0.05);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }

        /* Navbar */
        .navbar {
            background: rgba(18, 18, 24, 0.8);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 16px 32px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .logo-image {
            width: 40px;
            height: auto;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
        }

        .menu-icon {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            width: 42px;
            height: 42px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 20px;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .theme-toggle {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            width: 42px;
            height: 42px;
            border-radius: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-logout {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 40px;
            color: rgba(255,255,255,0.7);
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            top: 0;
            right: -320px;
            width: 300px;
            height: 100vh;
            background: rgba(18, 18, 24, 0.95);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 200;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .sidebar.open { right: 0; }
        .sidebar-header { padding: 30px 24px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .profile-avatar {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px auto;
            font-size: 36px;
            font-weight: 700;
        }
        .sidebar-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .sidebar-email { font-size: 12px; color: rgba(255,255,255,0.5); }
        .sidebar-menu { flex: 1; padding: 24px; }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            margin-bottom: 8px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: rgba(255,255,255,0.6);
        }
        .menu-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .menu-item i { width: 24px; }
        .menu-divider { height: 1px; background: rgba(255,255,255,0.08); margin: 16px 0; }
        .logout-item { color: #ff6b62; margin-top: auto; }
        .sidebar-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 199;
            display: none;
        }
        .sidebar-overlay.show { display: block; }

        /* Main Content */
        .main-content {
            margin-top: 80px;
            padding: 32px;
            position: relative;
            z-index: 1;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .modes-container { margin-bottom: 32px; }
        .modes-toggle {
            display: flex;
            gap: 12px;
            background: rgba(18, 18, 24, 0.6);
            backdrop-filter: blur(16px);
            padding: 6px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: fit-content;
        }
        .mode-btn {
            padding: 10px 28px;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.5);
            font-weight: 600;
            font-size: 13px;
            border-radius: 40px;
            cursor: pointer;
        }
        .mode-btn.active {
            background: linear-gradient(90deg, #1a1a24 0%, #0d0d14 100%);
            color: white;
            border: 0.5px solid rgba(255,255,255,0.1);
        }

        .resumo-header { margin-bottom: 24px; }
        .resumo-header h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .resumo-header p { color: rgba(255,255,255,0.5); font-size: 14px; }
        .resumo-header p span { color: white; font-weight: 600; }

        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            background: rgba(18, 18, 24, 0.6);
            backdrop-filter: blur(16px);
            padding: 12px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .metricas-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 24px; }
        .card-metrica {
            background: rgba(18, 18, 24, 0.6);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .metric-title { color: rgba(255,255,255,0.5); font-size: 13px; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; }
        .metric-value { font-size: 28px; font-weight: 800; }
        .card-destaque {
            background: linear-gradient(135deg, rgba(16,185,129,0.2) 0%, rgba(5,150,105,0.2) 100%);
            border: 1px solid rgba(16,185,129,0.3);
        }
        .card-destaque .metric-value { font-size: 36px; color: #10b981; }

        .row-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 32px;
        }
        .card-pequeno {
            background: rgba(18, 18, 24, 0.6);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 16px;
            text-align: center;
        }
        .card-pequeno .metric-title { font-size: 11px; margin-bottom: 6px; }
        .card-pequeno .metric-value { font-size: 20px; }

        .pedidos-section {
            background: rgba(18, 18, 24, 0.6);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 20px;
        }
        .pedidos-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .pedido-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .pedido-row { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .status-pago { background: rgba(16,185,129,0.2); color: #10b981; padding: 2px 10px; border-radius: 20px; font-size: 11px; }
        .status-pendente { background: rgba(245,158,11,0.2); color: #f59e0b; padding: 2px 10px; border-radius: 20px; font-size: 11px; }
        .cliente-nome { font-weight: 600; margin-bottom: 4px; }
        .valor-mzn { font-weight: 700; }
        .loading { text-align: center; padding: 40px; }
        .empty-state { text-align: center; padding: 40px; color: rgba(255,255,255,0.4); }

        @media (max-width: 480px) {
            .main-content { padding: 20px; }
            .row-cards { gap: 8px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo-area" onclick="window.location.href='dashboard.html'">
            <img src="ei_1777492717837-removebg-preview.png" class="logo-image">
        </div>
        <div class="user-area">
            <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
            <div class="menu-icon" id="menuIcon"><i class="fas fa-bars"></i></div>
        </div>
    </nav>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="profile-avatar" id="profile-avatar">V</div>
            <div class="sidebar-name" id="sidebar-name">Vendedor</div>
            <div class="sidebar-email" id="sidebar-email">carregando...</div>
        </div>
        <div class="sidebar-menu">
            <div class="menu-item" onclick="window.location.href='e-commerce.html'"><i class="fas fa-store"></i><span>E-COMMERCE</span></div>
            <div class="menu-item" onclick="window.location.href='createproduct.html'"><i class="fas fa-plus-circle"></i><span>Criar Produto</span></div>
            <div class="menu-item" onclick="window.location.href='loja.html'"><i class="fas fa-shopping-cart"></i><span>Ver Loja</span></div>
            <div class="menu-item" onclick="window.location.href='meus-pedidos.html'"><i class="fas fa-box"></i><span>Meus Pedidos</span></div>
            <div class="menu-divider"></div>
            <div class="menu-item logout-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span>Sair</span></div>
        </div>
    </div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="main-content">
        <div class="modes-container">
            <div class="modes-toggle">
                <button class="mode-btn active" onclick="carregarDados()">📊 DASHBOARD</button>
            </div>
        </div>

        <div class="resumo-header">
            <h1>Resumo de Vendas</h1>
            <p>Olá, <span id="user-name">Vendedor</span> 🇲🇿</p>
        </div>

        <div class="filter-bar">
            <div><i class="fas fa-calendar-alt"></i> Hoje</div>
            <div>MZN</div>
        </div>

        <div class="metricas-grid">
            <div class="card-metrica card-destaque">
                <div><div class="metric-title">RECEITA TOTAL</div><div class="metric-value" id="receita-total">0 MZN</div></div>
                <i class="fas fa-chart-line" style="font-size: 28px; opacity: 0.5;"></i>
            </div>
        </div>

        <div class="row-cards">
            <div class="card-pequeno"><div class="metric-title">VENDAS</div><div class="metric-value" id="vendas-total">0</div></div>
            <div class="card-pequeno"><div class="metric-title">PENDENTES</div><div class="metric-value" id="vendas-pendentes">0</div></div>
            <div class="card-pequeno"><div class="metric-title">PRODUTOS</div><div class="metric-value" id="produtos-total">0</div></div>
        </div>
        <div class="row-cards">
            <div class="card-pequeno"><div class="metric-title">LEADS</div><div class="metric-value" id="leads-total">0</div></div>
            <div class="card-pequeno"><div class="metric-title">VISUALIZAÇÕES</div><div class="metric-value" id="visualizacoes-total">0</div></div>
            <div class="card-pequeno"><div class="metric-title">CLIQUES</div><div class="metric-value" id="cliques-total">0</div></div>
        </div>

        <div class="pedidos-section">
            <div class="pedidos-header"><h3>📦 ÚLTIMOS PEDIDOS</h3><a style="cursor:pointer;" onclick="window.location.href='meus-pedidos.html'">Ver todos →</a></div>
            <div id="pedidos-list"><div class="loading"><i class="fas fa-spinner fa-spin"></i> Carregando...</div></div>
        </div>
    </div>

    <script>
        // ================= CONFIGURAÇÃO SUPABASE =================
        const SUPABASE_URL = "https://pbxufurblxmbzflaiqmh.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBieHVmdXJibHhtYnpmbGFpcW1oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MDY5MjcsImV4cCI6MjA5MzE4MjkyN30.wDSSnT4QWm1HK9dQDcXutyM271Qsg5kmFqQZFytA4pA";

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let usuarioAtual = null;

        // Tema
        let theme = localStorage.getItem('vantix_theme') || 'dark';
        function setTheme(t) {
            document.body.classList[t === 'light' ? 'add' : 'remove']('light');
            localStorage.setItem('vantix_theme', t);
        }
        setTheme(theme);
        document.getElementById('themeToggle').onclick = () => {
            theme = theme === 'dark' ? 'light' : 'dark';
            setTheme(theme);
            document.getElementById('themeToggle').innerHTML = theme === 'dark' ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
        };

        // Sidebar
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('show');
        }
        document.getElementById('menuIcon').onclick = toggleSidebar;
        document.getElementById('sidebarOverlay').onclick = toggleSidebar;
        document.getElementById('logoutBtn').onclick = async () => {
            await supabase.auth.signOut();
            localStorage.removeItem('vantix_session');
            window.location.href = 'acesso.html';
        };

        // Verificar sessão
        async function verificarSessao() {
            const { data: { session }, error } = await supabase.auth.getSession();
            if (error || !session) {
                window.location.href = 'acesso.html';
                return null;
            }
            usuarioAtual = session.user;
            document.getElementById('user-name').innerText = usuarioAtual.user_metadata?.nome?.split(' ')[0] || 'Vendedor';
            document.getElementById('sidebar-name').innerText = usuarioAtual.user_metadata?.nome || 'Vendedor';
            document.getElementById('sidebar-email').innerText = usuarioAtual.email;
            const inicial = (usuarioAtual.user_metadata?.nome?.charAt(0) || 'V').toUpperCase();
            document.getElementById('profile-avatar').innerText = inicial;
            return usuarioAtual;
        }

        // Carregar métricas REAIS do Supabase
        async function carregarDados() {
            if (!usuarioAtual) return;

            // 1. Produtos do vendedor
            const { data: produtos, error: prodError } = await supabase
                .from('produtos')
                .select('*')
                .eq('vendedor_id', usuarioAtual.id);

            if (prodError) console.error('Erro produtos:', prodError);

            const totalProdutos = produtos?.length || 0;
            const totalVisualizacoes = produtos?.reduce((sum, p) => sum + (p.visualizacoes || 0), 0) || 0;
            const totalCliques = produtos?.reduce((sum, p) => sum + (p.cliques || 0), 0) || 0;

            document.getElementById('produtos-total').innerText = totalProdutos;
            document.getElementById('visualizacoes-total').innerText = totalVisualizacoes;
            document.getElementById('cliques-total').innerText = totalCliques;

            // 2. Pedidos
            let pedidos = [];
            let totalReceita = 0;
            let totalVendas = 0;
            let totalPendentes = 0;

            if (produtos && produtos.length > 0) {
                const produtoIds = produtos.map(p => p.id);
                const { data: pedidosData, error: pedError } = await supabase
                    .from('pedidos')
                    .select('*')
                    .in('produto_id', produtoIds)
                    .order('criado_em', { ascending: false });

                if (!pedError && pedidosData) {
                    pedidos = pedidosData;
                    const pagos = pedidosData.filter(p => p.status === 'pago');
                    totalReceita = pagos.reduce((sum, p) => sum + (p.valor || 0), 0);
                    totalVendas = pagos.length;
                    totalPendentes = pedidosData.filter(p => p.status === 'pendente').length;
                }
            }

            document.getElementById('receita-total').innerText = totalReceita.toLocaleString('pt-MZ', { minimumFractionDigits: 0 }) + ' MZN';
            document.getElementById('vendas-total').innerText = totalVendas;
            document.getElementById('vendas-pendentes').innerText = totalPendentes;

            // 3. Leads
            let totalLeads = 0;
            if (produtos && produtos.length > 0) {
                const produtoIds = produtos.map(p => p.id);
                const { data: leadsData, error: leadError } = await supabase
                    .from('leads')
                    .select('*', { count: 'exact', head: true })
                    .in('produto_id', produtoIds);
                if (!leadError) totalLeads = leadsData?.length || 0;
            }
            document.getElementById('leads-total').innerText = totalLeads;

            // 4. Renderizar últimos pedidos
            const pedidosList = document.getElementById('pedidos-list');
            if (!pedidos || pedidos.length === 0) {
                pedidosList.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>Nenhum pedido ainda</p></div>';
            } else {
                pedidosList.innerHTML = pedidos.slice(0, 5).map(p => `
                    <div class="pedido-card">
                        <div class="pedido-row">
                            <span class="cliente-nome">${p.cliente_nome || 'Cliente'}</span>
                            <span class="${p.status === 'pago' ? 'status-pago' : 'status-pendente'}">${p.status === 'pago' ? 'PAGO' : 'PENDENTE'}</span>
                        </div>
                        <div class="pedido-row">
                            <span>${p.produto_nome || 'Produto'}</span>
                            <span class="valor-mzn">${(p.valor || 0).toLocaleString()} MZN</span>
                        </div>
                        <div style="font-size: 11px; color: rgba(255,255,255,0.4);">${new Date(p.criado_em).toLocaleDateString('pt-MZ')}</div>
                    </div>
                `).join('');
            }
        }

        async function init() {
            await verificarSessao();
            if (usuarioAtual) {
                await carregarDados();
                // Atualizar a cada 30 segundos
                setInterval(carregarDados, 30000);
            }
        }

        init();
    </script>
</body>
</html>
