<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackZone — Meus Produtos</title>
    <link rel="icon" type="image/png" href="../bzlogo.png">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #000; --card: #0a0a0a; --gold: #d4af37; --border: rgba(255,255,255,0.05); }
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; display: flex; }
        .sidebar { width: 260px; height: 100vh; background: #050505; border-right: 1px solid var(--border); padding: 40px 24px; position: fixed; }
        .main { margin-left: 260px; padding: 40px 60px; width: 100%; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 15px; color: #555; text-decoration: none; font-weight: 700; border-radius: 12px; margin-bottom: 5px; }
        .nav-item.active { background: rgba(212,175,55,0.05); color: #fff; }
        .grid-products { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; margin-top: 30px; }
        .product-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 20px; text-align: center; }
        .product-img { width: 100%; height: 180px; border-radius: 16px; object-fit: cover; margin-bottom: 15px; background: #111; }
        .product-name { font-size: 18px; font-weight: 800; margin-bottom: 5px; }
        .product-price { color: var(--gold); font-weight: 900; font-size: 20px; }
        .btn-add { background: var(--gold); color: #000; padding: 12px 24px; border-radius: 12px; text-decoration: none; font-weight: 800; font-size: 14px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div style="margin-bottom: 50px;"><img src="../bzlogo.png" width="40"></div>
        <a href="dashboard.html" class="nav-item"><i class="fas fa-th-large"></i> Dashboard</a>
        <a href="infoproductos.html" class="nav-item active"><i class="fas fa-box"></i> Produtos</a>
        <a href="saques.html" class="nav-item"><i class="fas fa-wallet"></i> Saques</a>
    </aside>
    <main class="main">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Meus Produtos</h1>
            <a href="#" class="btn-add"><i class="fas fa-plus"></i> Novo Produto</a>
        </header>
        <div class="grid-products" id="productGrid">
            <!-- Produtos serão carregados aqui -->
        </div>
    </main>
    <script>
        const sb = supabase.createClient("https://ubrtzwehabosbzucures.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVienR6d2VoYWJvc2J6dWN1cmVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MTQ5MTIsImV4cCI6MjA5Mzk5MDkxMn0.3e1t7ROgxyllNNMkDXt6VCoObArTHSweVLBWrg70_f8");
        async function loadProducts() {
            const { data: { user } } = await sb.auth.getUser();
            const { data: prods } = await sb.from('produtos').select('*').eq('vendedor_id', user.id);
            const grid = document.getElementById('productGrid');
            if (prods) {
                grid.innerHTML = prods.map(p => `
                    <div class="product-card">
                        <img src="${p.imagem || 'https://placehold.co/300x200?text=BlackZone'}" class="product-img">
                        <div class="product-name">${p.nome}</div>
                        <div class="product-price">MT ${parseFloat(p.preco).toLocaleString('pt-MZ')}</div>
                    </div>
                `).join('');
            }
        }
        loadProducts();
    </script>
</body>
</html>
