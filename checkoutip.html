<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Seguro — ZentroPay</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Adicione seu CSS aqui ou mantenha o link externo */
        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

    <div id="checkout-container">
        <div class="header">
            <h2 id="product-name">Sincronizando...</h2>
            <h1 id="total-price">0,00 MZN</h1>
        </div>

        <form id="payment-form">
            <input type="text" placeholder="Seu nome" required>
            <input type="email" placeholder="seu@email.com" required>

            <div class="methods">
                <label>
                    <input type="radio" name="method" value="emola" checked>
                    <img src="assets/emola-logo.png" alt="e-Mola" onerror="this.src='https://via.placeholder.com/40?text=eMola'">
                    e-Mola
                </label>
                <label>
                    <input type="radio" name="method" value="mpesa">
                    <img src="assets/mpesa-logo.png" alt="M-Pesa" onerror="this.src='https://via.placeholder.com/40?text=Mpesa'">
                    M-Pesa
                </label>
            </div>

            <button type="submit" id="btn-finalizar">FINALIZAR COMPRA - 0,00 MZN</button>
        </form>
    </div>

    <script>
        // 1. CONFIGURAÇÃO ÚNICA (Evita o erro de "already declared")
        const SUPABASE_URL = 'SUA_URL_DO_SUPABASE';
        const SUPABASE_KEY = 'SUA_ANON_KEY_DO_SUPABASE';
        
        // Verifica se a variável já existe no escopo global para não dar erro
        if (typeof supabase === 'undefined' || !window._supabaseInstance) {
            window._supabaseInstance = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }
        const db = window._supabaseInstance;

        // 2. FUNÇÃO PARA CARREGAR DADOS DO CHECKOUT
        async function loadCheckoutData() {
            try {
                // Exemplo: buscando o produto atual da URL ou banco
                const urlParams = new URLSearchParams(window.location.search);
                const productId = urlParams.get('id') || '1';

                const { data, error } = await db
                    .from('produtos') // Nome da sua tabela
                    .select('*')
                    .eq('id', productId)
                    .single();

                if (error) throw error;

                if (data) {
                    // Atualiza a UI com os dados reais
                    document.getElementById('product-name').innerText = data.nome;
                    const precoFormatado = `${data.preco.toLocaleString('pt-MZ')},00 MZN`;
                    document.getElementById('total-price').innerText = precoFormatado;
                    document.getElementById('btn-finalizar').innerText = `FINALIZAR COMPRA - ${precoFormatado}`;
                }
            } catch (err) {
                console.error("Erro ao sincronizar:", err.message);
                document.getElementById('product-name').innerText = "Erro ao carregar dados";
            }
        }

        // Executa ao carregar a página
        window.onload = loadCheckoutData;

        // 3. LÓGICA DE ENVIO DO FORMULÁRIO
        document.getElementById('payment-form').onsubmit = async (e) => {
            e.preventDefault();
            alert("Processando pagamento via ZentroPay...");
            // Insira aqui sua chamada para a API de pagamento
        };
    </script>
</body>
</html>
