<!DOCTYPE html>
<html lang="pt-mz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZentroPay — Checkout Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #10b981; --bg: #0a0a0c; --card: rgba(18, 18, 24, 0.8); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 24px; margin-bottom: 20px; backdrop-filter: blur(10px); }
        .price-tag { font-size: 28px; font-weight: 800; color: var(--primary); margin: 10px 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; font-weight: 600; }
        input { width: 100%; padding: 14px; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; outline: none; }
        input:focus { border-color: var(--primary); }
        .methods { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .method-opt { border: 1px solid #333; padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.2s; }
        .method-opt.active { border-color: var(--primary); background: rgba(16, 185, 129, 0.1); }
        .btn-pay { width: 100%; padding: 18px; background: var(--primary); border: none; border-radius: 50px; color: #fff; font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .btn-pay:disabled { opacity: 0.5; cursor: not-allowed; }
        .status { margin-top: 15px; padding: 12px; border-radius: 10px; display: none; text-align: center; font-size: 14px; }
        .info { background: rgba(59, 130, 246, 0.2); color: #93c5fd; display: block; }
        .error { background: rgba(239, 68, 68, 0.2); color: #fca5a5; display: block; }
        .success { background: rgba(16, 185, 129, 0.2); color: #a7f3d0; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div id="loader" style="text-align:center; padding:50px;">Sincronizando Vantix...</div>
    
    <div id="main-content" style="display:none;">
        <div class="card">
            <h2 id="prod-name">---</h2>
            <div class="price-tag" id="prod-price">MT 0,00</div>
        </div>

        <div class="card">
            <form id="checkout-form">
                <div class="form-group"><label>NOME COMPLETO</label><input type="text" id="name" required></div>
                <div class="form-group"><label>E-MAIL</label><input type="email" id="email" required></div>
                
                <label>MÉTODO DE PAGAMENTO</label>
                <div class="methods">
                    <div class="method-opt active" id="m-emola" onclick="selectMethod('emola')">e-Mola</div>
                    <div class="method-opt" id="m-mpesa" onclick="selectMethod('mpesa')">M-Pesa</div>
                </div>

                <div class="form-group">
                    <label id="phone-label">NÚMERO E-MOLA (86/87)</label>
                    <input type="tel" id="phone" placeholder="8XXXXXXXX" required>
                </div>

                <button type="submit" class="btn-pay" id="btn-submit">FINALIZAR PAGAMENTO</button>
                <div id="msg" class="status"></div>
            </form>
        </div>
    </div>
</div>

<script>
    // Configurações de Banco de Dados
    const S_URL = "https://pbxufurblxmbzflaiqmh.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBieHVmdXJibHhtYnpmbGFpcW1oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MDY5MjcsImV4cCI6MjA5MzE4MjkyN30.wDSSnT4QWm1HK9dQDcXutyM271Qsg5kmFqQZFytA4pA";
    
    const db = supabase.createClient(S_URL, S_KEY);

    let currentProd = null;
    let currentMethod = 'emola';

    async function start() {
        const id = new URLSearchParams(window.location.search).get('id');
        if (!id) return alert("Produto não identificado.");

        const { data, error } = await db.from('produtos').select('*').eq('id', id).single();
        if (error || !data) return alert("Erro ao carregar produto.");

        currentProd = data;
        document.getElementById('prod-name').innerText = data.nome;
        document.getElementById('prod-price').innerText = `MT ${data.preco.toLocaleString('pt-MZ')},00`;
        document.getElementById('loader').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
    }

    window.selectMethod = (m) => {
        currentMethod = m;
        document.getElementById('m-emola').classList.toggle('active', m === 'emola');
        document.getElementById('m-mpesa').classList.toggle('active', m === 'mpesa');
        document.getElementById('phone-label').innerText = `NÚMERO ${m.toUpperCase()} (8${m === 'emola' ? '6/87' : '4/85'})`;
    };

    document.getElementById('checkout-form').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-submit');
        const msg = document.getElementById('msg');
        
        btn.disabled = true;
        btn.innerText = "PROCESSANDO...";
        msg.className = "status info";
        msg.innerText = "Aguarde a solicitação do PIN no telemóvel...";

        try {
            const payload = {
                amount: currentProd.preco,
                payment_method: currentMethod,
                customer: {
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value.replace(/\s/g, '')
                },
                reference: "VANTIX-" + Date.now(),
                description: "Vantix: " + currentProd.nome
            };

            // LINK ATUALIZADO DO CLOUDFLARE
            const response = await fetch('https://attended-ent-though-award.trycloudflare.com/processar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const result = await response.json();

            if (response.ok) {
                msg.className = "status success";
                msg.innerText = "✅ PIN Solicitado! Insira para confirmar o pagamento.";
                
                await db.from('pedidos').insert([{ 
                    cliente: payload.customer.name, 
                    valor: payload.amount, 
                    status: 'pendente',
                    ref: payload.reference 
                }]);
            } else {
                throw new Error(result.message || "Erro no processamento");
            }
        } catch (err) {
            msg.className = "status error";
            msg.innerText = "Erro: " + err.message;
            btn.disabled = false;
            btn.innerText = "TENTAR NOVAMENTE";
        }
    };

    start();
</script>
</body>
</html>
