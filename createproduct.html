<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZentroPay — Em Desenvolvimento</title>
    <link rel="icon" type="image/png" href="ei_1777492717837-removebg-preview.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Efeito de Grid Animado para manter o padrão visual da Vantix/ZentroPay */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }

        .container { width: 100%; max-width: 480px; position: relative; z-index: 2; }
        
        .glass-panel {
            background: rgba(18, 18, 24, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 60px 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            text-align: center;
        }

        .icon-container {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .icon-container svg {
            width: 40px;
            height: 40px;
            fill: #10b981; /* Cor verde ZentroPay */
        }

        h1 {
            color: white;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .btn-liquid-premium {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 44px;
            background: linear-gradient(90deg, #1a1a24 0%, #0d0d14 100%);
            color: white;
            font-weight: 700;
            font-size: 14px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s;
            border: 0.5px solid rgba(255,255,255,0.1);
        }

        .btn-liquid-premium:hover {
            background: linear-gradient(90deg, #2a2a38 0%, #1a1a24 100%);
            transform: translateY(-2px);
            border-color: rgba(255,255,255,0.2);
        }

        .btn-liquid-premium svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .footer-note {
            margin-top: 40px;
            font-size: 10px;
            color: rgba(255,255,255,0.2);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-panel">
            <div class="icon-container">
                <svg viewBox="0 0 24 24">
                    <path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/>
                </svg>
            </div>

            <h1>Em Desenvolvimento</h1>
            <p>Esta parte está em desenvolvimento no momento.<br>Tente o e-commerce enquanto finalizamos os detalhes.</p>

            <a href="dashboard.html" class="btn-liquid-premium">
                <svg viewBox="0 0 24 24">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                </svg>
                VOLTAR PARA DASHBOARD
            </a>

            <div class="footer-note">
                ✦ ENCRYPTED BY ZENTROPAY SECURE LAYER ✦
            </div>
        </div>
    </div>
</body>
</html>
