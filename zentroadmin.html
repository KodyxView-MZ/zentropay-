<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ZentroPay — Admin Core</title>
    <link rel="icon" type="image/png" href="ei_1777492717837-removebg-preview.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #07070b;
            --bg-glass: rgba(20,20,28,0.75);
            --border-subtle: rgba(255,255,255,0.06);
            --accent: #a855f7;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }
        body {
            background: var(--bg-primary);
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(168,85,247,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(168,85,247,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }
        .glow-orb {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            opacity: 0.4;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
        }
        .orb-1 { top: -200px; right: -200px; background: radial-gradient(circle, var(--accent), transparent); }
        .orb-2 { bottom: -200px; left: -200px; background: radial-gradient(circle, #7c3aed, transparent); }
        .app-container { display: flex; min-height: 100vh; position: relative; z-index: 2; }
        .sidebar {
            width: 280px;
            background: rgba(10,10,15,0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-subtle);
            padding: 32px 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            z-index: 50;
        }
        .logo-area { display: flex; align-items: center; gap: 12px; margin-bottom: 48px; padding: 0 12px; }
        .logo-img { width: 42px; height: 42px; border-radius: 14px; filter: drop-shadow(0 4px 12px rgba(168,85,247,0.3)); }
        .logo-text { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(135deg, #fff, var(--accent)); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-menu { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            border-radius: 16px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            font-size: 14px;
        }
        .nav-item i { width: 24px; font-size: 18px; }
        .nav-item:hover { background: rgba(168,85,247,0.1); color: white; }
        .nav-item.active {
            background: linear-gradient(135deg, rgba(168,85,247,0.15), rgba(124,58,237,0.1));
            color: var(--accent);
            border: 1px solid rgba(168,85,247,0.2);
        }
        .user-info { padding: 20px 12px; border-top: 1px solid var(--border-subtle); margin-top: auto; }
        .user-email { font-size: 12px; color: var(--text-secondary); margin-bottom: 12px; word-break: break-all; }
        .logout-btn {
            width: 100%;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            color: #f87171;
            padding: 10px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            text-align: center;
        }
        .logout-btn:hover { background: rgba(239,68,68,0.2); }
        .main-content { flex: 1; margin-left: 280px; padding: 32px 40px; }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            padding: 20px 28px;
            border-radius: 28px;
            border: 1px solid var(--border-subtle);
        }
        .page-title h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
        .page-title p { font-size: 13px; color: var(--text-secondary); }
        .admin-badge { background: rgba(168,85,247,0.15); padding: 8px 20px; border-radius: 40px; font-size: 12px; font-weight: 600; color: var(--accent); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-subtle);
            border-radius: 24px;
            padding: 22px;
            transition: 0.2s;
        }
        .stat-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .stat-icon { font-size: 28px; color: var(--accent); margin-bottom: 16px; }
        .stat-value { font-size: 34px; font-weight: 800; margin-bottom: 6px; }
        .stat-label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
        .data-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-subtle);
            border-radius: 28px;
            overflow: hidden;
        }
        .panel-header {
            padding: 24px 28px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-header h3 { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .refresh-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-subtle);
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 12px;
            color: var(--text-secondary);
        }
        .refresh-btn:hover { background: rgba(168,85,247,0.2); color: var(--accent); }
        
        .table-wrapper {
            overflow-x: auto;
            padding: 0 4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }
        th {
            text-align: left;
            padding: 18px 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-subtle);
            background: rgba(0,0,0,0.2);
        }
        td {
            padding: 16px 20px;
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            vertical-align: middle;
        }
        .badge {
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 10px;
            font-weight: 700;
            display: inline-block;
            white-space: nowrap;
        }
        .badge-active { background: rgba(16,185,129,0.15); color: var(--success); }
        .badge-suspended { background: rgba(239,68,68,0.15); color: var(--danger); }
        .badge-pending { background: rgba(245,158,11,0.15); color: var(--warning); }
        .action-btn {
            background: transparent;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 10px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: 0.2s;
            margin-right: 8px;
            font-size: 16px;
        }
        .action-btn:hover { background: rgba(168,85,247,0.2); color: var(--accent); }
        .action-success:hover { background: rgba(16,185,129,0.2); color: var(--success); }
        .action-danger:hover { background: rgba(239,68,68,0.2); color: var(--danger); }
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(16px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-card {
            background: #0f0f14;
            border: 1px solid var(--border-subtle);
            border-radius: 32px;
            max-width: 600px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 32px;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .modal-header h3 { font-size: 22px; font-weight: 700; }
        .close-modal { cursor: pointer; font-size: 24px; color: var(--text-secondary); }
        .product-img { width: 100%; border-radius: 20px; margin-bottom: 20px; background: #1a1a22; min-height: 150px; object-fit: cover; }
        .info-row { margin-bottom: 16px; }
        .info-label { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .info-value { font-size: 14px; font-weight: 500; }
        .loader { text-align: center; padding: 60px; color: var(--text-secondary); }
        @media (max-width: 900px) { .sidebar { display: none; } .main-content { margin-left: 0; padding: 20px; } }
    </style>
</head>
<body>
<div class="glow-orb orb-1"></div>
<div class="glow-orb orb-2"></div>

<div class="app-container">
    <aside class="sidebar">
        <div class="logo-area">
            <img src="ei_1777492717837-removebg-preview.png" class="logo-img" alt="ZentroPay">
            <span class="logo-text">ZentroPay</span>
        </div>
        <div class="nav-menu">
            <div class="nav-item active" data-tab="users"><i class="fas fa-users"></i><span>Operadores</span></div>
            <div class="nav-item" data-tab="products"><i class="fas fa-boxes"></i><span>Infoprodutos</span></div>
            <div class="nav-item" data-tab="pending"><i class="fas fa-clock"></i><span>Pendentes</span></div>
            <div class="nav-item" data-tab="sales"><i class="fas fa-chart-line"></i><span>Transacoes</span></div>
            <div class="nav-item" data-tab="withdrawals"><i class="fas fa-money-bill-wave"></i><span>Saques</span></div>
        </div>
        <div class="user-info">
            <div class="user-email" id="adminEmail">Carregando...</div>
            <div class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Sair</div>
        </div>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <div class="page-title"><h1>Command Center</h1><p>Gestao total da plataforma</p></div>
            <div class="admin-badge"><i class="fas fa-shield-alt"></i> Root Access</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-users"></i></div><div class="stat-value" id="totalUsers">--</div><div class="stat-label">Total Operadores</div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-check-circle"></i></div><div class="stat-value" id="activeUsers">--</div><div class="stat-label">Ativos</div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-ban"></i></div><div class="stat-value" id="suspendedUsers">--</div><div class="stat-label">Suspensos</div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-cube"></i></div><div class="stat-value" id="totalProducts">--</div><div class="stat-label">Infoprodutos</div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-hourglass-half"></i></div><div class="stat-value" id="pendingProducts">--</div><div class="stat-label">Aguardando</div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-coins"></i></div><div class="stat-value" id="totalRevenue">--</div><div class="stat-label">Volume MZN</div></div>
        </div>

        <div class="data-panel">
            <div class="panel-header">
                <h3><i class="fas fa-terminal"></i> <span id="panelTitle">Operadores Registrados</span></h3>
                <button class="refresh-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i> Atualizar</button>
            </div>
            <div class="table-wrapper" id="tableContainer"><div class="loader"><i class="fas fa-spinner fa-pulse"></i> Carregando...</div></div>
        </div>
    </main>
</div>

<div id="productModal" class="modal">
    <div class="modal-card">
        <div class="modal-header"><h3><i class="fas fa-info-circle" style="color: var(--accent);"></i> Detalhes do Produto</h3><i class="fas fa-times close-modal" onclick="closeProductModal()"></i></div>
        <div id="modalContent"></div>
    </div>
</div>

<script>
// CORRECAO DEFINITIVA - SEM REDIRECIONAMENTO
(function() {
    const SUPABASE_URL = "https://pbxufurblxmbzflaiqmh.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBieHVmdXJibHhtYnpmbGFpcW1oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MDY5MjcsImV4cCI6MjA5MzE4MjkyN30.wDSSnT4QWm1HK9dQDcXutyM271Qsg5kmFqQZFytA4pA";
    
    let supabase;
    if (window._zentroSupabase) {
        supabase = window._zentroSupabase;
    } else {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        window._zentroSupabase = supabase;
    }
    
    let currentTab = 'users';
    let currentUser = null;
    
    // FUNCAO PRINCIPAL - SEM REDIRECIONAMENTO PARA ACESSO.HTML
    async function init() {
        try {
            const { data: { session }, error } = await supabase.auth.getSession();
            
            // SE NAO TIVER SESSAO, TENTAR RENOVAR
            if (error || !session) {
                console.log("Sem sessao, tentando renovar...");
                const { data: refreshData, error: refreshError } = await supabase.auth.refreshSession();
                if (refreshError || !refreshData.session) {
                    console.log("Nao foi possivel renovar sessao");
                    document.getElementById('adminEmail').innerHTML = '<i class="fas fa-exclamation-triangle"></i> Sessao expirada - <a href="acesso.html">Clique aqui para logar</a>';
                    return;
                }
                currentUser = refreshData.session.user;
            } else {
                currentUser = session.user;
            }
            
            document.getElementById('adminEmail').innerHTML = '<i class="fas fa-envelope"></i> ' + currentUser.email;
            
            await loadStats();
            await loadUsers();
            setupNavigation();
            
            // Refresh automatico a cada 30 segundos
            setInterval(async () => {
                await loadStats();
                await refreshCurrentTab();
            }, 30000);
            
        } catch (err) {
            console.error("Erro na inicializacao:", err);
            document.getElementById('adminEmail').innerHTML = '<i class="fas fa-exclamation-triangle"></i> Erro ao carregar';
        }
    }
    
    async function refreshCurrentTab() {
        if (currentTab === 'users') await loadUsers();
        else if (currentTab === 'products') await loadAllProducts();
        else if (currentTab === 'pending') await loadPendingProducts();
        else if (currentTab === 'sales') await loadSales();
        else if (currentTab === 'withdrawals') await loadWithdrawals();
    }
    
    async function loadStats() {
        try {
            const [usersRes, productsRes, vendasRes] = await Promise.all([
                supabase.from('usuarios').select('status'),
                supabase.from('produtos').select('status'),
                supabase.from('vendas').select('valor_total')
            ]);
            
            if (usersRes.data) {
                document.getElementById('totalUsers').innerText = usersRes.data.length;
                document.getElementById('activeUsers').innerText = usersRes.data.filter(function(u) { return u.status === 'active'; }).length;
                document.getElementById('suspendedUsers').innerText = usersRes.data.filter(function(u) { return u.status === 'suspended' || u.status === 'banned'; }).length;
            }
            if (productsRes.data) {
                document.getElementById('totalProducts').innerText = productsRes.data.length;
                document.getElementById('pendingProducts').innerText = productsRes.data.filter(function(p) { return p.status === 'pending'; }).length;
            }
            if (vendasRes.data && vendasRes.data.length) {
                var total = vendasRes.data.reduce(function(acc, v) { return acc + (v.valor_total || 0); }, 0);
                document.getElementById('totalRevenue').innerText = total.toLocaleString('pt-MZ');
            }
        } catch (err) { console.error("Stats error:", err); }
    }
    
    async function loadUsers() {
        var result = await supabase.from('usuarios').select('*').order('criado_em', { ascending: false });
        var data = result.data;
        var error = result.error;
        if (error || !data || data.length === 0) {
            document.getElementById('tableContainer').innerHTML = '<div class="loader">Nenhum operador encontrado</div>';
            return;
        }
        
        var html = '<td><thead><tr><th>Operador</th><th>Email</th><th>Status</th><th>Acoes</th></tr></thead><tbody>';
        for (var i = 0; i < data.length; i++) {
            var u = data[i];
            var statusClass = u.status === 'active' ? 'badge-active' : 'badge-suspended';
            var statusText = u.status === 'active' ? 'ATIVO' : 'SUSPENSO';
            html += '<tr>' +
                '<td><strong>' + (u.nome || '—') + '</strong></td>' +
                '<td>' + (u.email || '—') + '</td>' +
                '<td><span class="badge ' + statusClass + '">' + statusText + '</span></td>' +
                '<td><button class="action-btn" onclick="window.toggleUser(\'' + u.id + '\', \'' + u.status + '\')" title="' + (u.status === 'active' ? 'Suspender' : 'Ativar') + '"><i class="fas ' + (u.status === 'active' ? 'fa-ban' : 'fa-check-circle') + '"></i></button></td>' +
            '</tr>';
        }
        html += '</tbody></table>';
        document.getElementById('tableContainer').innerHTML = html;
        document.getElementById('panelTitle').innerHTML = 'Operadores Registrados';
    }
    
    async function loadAllProducts() {
        var result = await supabase.from('produtos').select('*').order('criado_em', { ascending: false });
        var data = result.data;
        var error = result.error;
        if (error || !data || data.length === 0) {
            document.getElementById('tableContainer').innerHTML = '<div class="loader">Nenhum produto encontrado</div>';
            return;
        }
        
        var html = '<table><thead><tr><th>Produto</th><th>Preco</th><th>Status</th><th>Acoes</th></tr></thead><tbody>';
        for (var i = 0; i < data.length; i++) {
            var p = data[i];
            var statusClass = 'badge-pending';
            var statusText = 'PENDENTE';
            if (p.status === 'active') { statusClass = 'badge-active'; statusText = 'ATIVO'; }
            else if (p.status === 'banned') { statusClass = 'badge-suspended'; statusText = 'BANIDO'; }
            else if (p.status === 'rejected') { statusClass = 'badge-suspended'; statusText = 'REJEITADO'; }
            
            html += '<tr>' +
                '<td><strong>' + (p.nome || '—') + '</strong><br><small>ID: ' + p.id.slice(0,8) + '</small></td>' +
                '<td><strong>' + (p.preco || 0).toLocaleString('pt-MZ') + ' MZN</strong></td>' +
                '<td><span class="badge ' + statusClass + '">' + statusText + '</span></td>' +
                '<td>' +
                    '<button class="action-btn" onclick="window.viewProduct(\'' + p.id + '\')" title="Ver"><i class="fas fa-eye"></i></button>' +
                    (p.status === 'active' ? '<button class="action-btn action-danger" onclick="window.banProduct(\'' + p.id + '\')" title="Banir"><i class="fas fa-skull-crosswalk"></i></button>' : '<button class="action-btn action-success" onclick="window.unbanProduct(\'' + p.id + '\')" title="Reativar"><i class="fas fa-rocket"></i></button>') +
                '</td>' +
            '</table>';
        }
        html += '</tbody></table>';
        document.getElementById('tableContainer').innerHTML = html;
        document.getElementById('panelTitle').innerHTML = 'Todos os Produtos';
    }
    
    async function loadPendingProducts() {
        var result = await supabase.from('produtos').select('*').eq('status', 'pending').order('criado_em', { ascending: false });
        var data = result.data;
        var error = result.error;
        if (error || !data || data.length === 0) {
            document.getElementById('tableContainer').innerHTML = '<div class="loader">Nenhum produto aguardando aprovacao</div>';
            return;
        }
        
        var html = '<table><thead><tr><th>Produto</th><th>Preco</th><th>Data</th><th>Acoes</th></tr></thead><tbody>';
        for (var i = 0; i < data.length; i++) {
            var p = data[i];
            html += '<tr>' +
                '<td><strong>' + (p.nome || '—') + '</strong><br><small>' + (p.descricao_curta ? p.descricao_curta.slice(0,40) : '') + '</small></td>' +
                '<td><strong>' + (p.preco || 0).toLocaleString('pt-MZ') + ' MZN</strong></td>' +
                '<td><small>' + new Date(p.criado_em).toLocaleDateString('pt-BR') + '</small></td>' +
                '<td>' +
                    '<button class="action-btn" onclick="window.viewProduct(\'' + p.id + '\')" title="Ver"><i class="fas fa-eye"></i></button>' +
                    '<button class="action-btn action-success" onclick="window.approveProduct(\'' + p.id + '\')" title="Aprovar"><i class="fas fa-check-circle"></i></button>' +
                    '<button class="action-btn action-danger" onclick="window.rejectProduct(\'' + p.id + '\')" title="Rejeitar"><i class="fas fa-times-circle"></i></button>' +
                '</td>' +
            '</tr>';
        }
        html += '</tbody></table>';
        document.getElementById('tableContainer').innerHTML = html;
        document.getElementById('panelTitle').innerHTML = 'Produtos Aguardando Aprovacao';
    }
    
    async function loadSales() {
        var result = await supabase.from('vendas').select('*, produtos(nome)').order('criado_em', { ascending: false }).limit(50);
        var data = result.data;
        var error = result.error;
        if (error || !data || data.length === 0) {
            document.getElementById('tableContainer').innerHTML = '<div class="loader">Nenhuma venda registrada</div>';
            return;
        }
        
        var html = '</table><thead><tr><th>Produto</th><th>Cliente</th><th>Valor</th><th>Status</th><th>Data</th></tr></thead><tbody>';
        for (var i = 0; i < data.length; i++) {
            var v = data[i];
            var statusClass = v.status_venda === 'sucesso' ? 'badge-active' : 'badge-pending';
            var statusText = v.status_venda === 'sucesso' ? 'PAGO' : 'PENDENTE';
            html += '<tr>' +
                '<td><strong>' + (v.produtos?.nome || '—') + '</strong></td>' +
                '<td>' + (v.cliente_nome || (v.cliente_email ? v.cliente_email.split('@')[0] : '—')) + '</td>' +
                '<td><strong>' + (v.valor_total || 0).toLocaleString('pt-MZ') + ' MZN</strong></td>' +
                '<td><span class="badge ' + statusClass + '">' + statusText + '</span></td>' +
                '<td><small>' + new Date(v.criado_em).toLocaleDateString('pt-BR') + '</small></td>' +
            '</tr>';
        }
        html += '</tbody></tr>';
        document.getElementById('tableContainer').innerHTML = html;
        document.getElementById('panelTitle').innerHTML = 'Ultimas Transacoes';
    }
    
    async function loadWithdrawals() {
        try {
            var result = await supabase.from('saques').select('*, usuarios(nome, email)').order('criado_em', { ascending: false });
            var data = result.data;
            var error = result.error;
            
            if (error) {
                console.error("Erro ao carregar saques:", error);
                document.getElementById('tableContainer').innerHTML = '<div class="loader">Erro ao carregar solicitacoes de saque</div>';
                return;
            }
            
            if (!data || data.length === 0) {
                document.getElementById('tableContainer').innerHTML = '<div class="loader">Nenhuma solicitacao de saque encontrada</div>';
                return;
            }
            
            var html = '</table><thead><tr><th>Vendedor</th><th>Valor Solicitado</th><th>Valor Liquido</th><th>Metodo</th><th>Dados da Carteira</th><th>Status</th><th>Data</th><th>Acoes</th></tr></thead><tbody>';
            
            for (var i = 0; i < data.length; i++) {
                var s = data[i];
                var statusClass = 'badge-pending';
                var statusText = 'PENDENTE';
                if (s.status === 'aprovado') { statusClass = 'badge-active'; statusText = 'APROVADO'; }
                else if (s.status === 'rejeitado') { statusClass = 'badge-suspended'; statusText = 'REJEITADO'; }
                
                var valorSolicitado = Number(s.valor_solicitado).toLocaleString('pt-MZ', {minimumFractionDigits: 2});
                var valorLiquido = Number(s.valor_liquido).toLocaleString('pt-MZ', {minimumFractionDigits: 2});
                var dataFormatada = new Date(s.criado_em).toLocaleDateString('pt-BR');
                var metodoTexto = s.metodo === 'emola' ? 'E-Mola' : 'M-Pesa';
                var nomeVendedor = s.usuarios?.nome || '—';
                var emailVendedor = s.usuarios?.email || '—';
                
                html += '<tr>' +
                    '<td><strong>' + nomeVendedor + '</strong><br><small>' + emailVendedor + '</small></td>' +
                    '<td>' + valorSolicitado + ' MZN</div>' +
                    '<td>' + valorLiquido + ' MZN</div>' +
                    '<td>' + metodoTexto + '</div>' +
                    '<td><small>' + (s.dados_carteira || '—') + '</small></div>' +
                    '<td><span class="badge ' + statusClass + '">' + statusText + '</span></div>' +
                    '<td><small>' + dataFormatada + '</small></div>' +
                    '<td>' +
                        (s.status === 'pendente' ? 
                            '<button class="action-btn action-success" onclick="window.approveWithdrawal(\'' + s.id + '\')" title="Aprovar"><i class="fas fa-check-circle"></i></button>' +
                            '<button class="action-btn action-danger" onclick="window.rejectWithdrawal(\'' + s.id + '\')" title="Rejeitar"><i class="fas fa-times-circle"></i></button>' : 
                            '<span style="color:#6b7280;">—</span>') +
                    '</td>' +
                '</tr>';
            }
            html += '</tbody></table>';
            document.getElementById('tableContainer').innerHTML = html;
            document.getElementById('panelTitle').innerHTML = 'Solicitacoes de Saque';
        } catch (err) {
            console.error("Erro em loadWithdrawals:", err);
            document.getElementById('tableContainer').innerHTML = '<div class="loader">Erro ao carregar solicitacoes de saque</div>';
        }
    }
    
    // Funcoes de acao
    window.toggleUser = async function(userId, currentStatus) {
        var newStatus = currentStatus === 'active' ? 'suspended' : 'active';
        await supabase.from('usuarios').update({ status: newStatus }).eq('id', userId);
        await loadStats();
        if (currentTab === 'users') loadUsers();
    };
    
    window.approveProduct = async function(productId) {
        await supabase.from('produtos').update({ status: 'active' }).eq('id', productId);
        await loadStats();
        if (currentTab === 'pending') loadPendingProducts();
        if (currentTab === 'products') loadAllProducts();
        alert('Produto aprovado!');
    };
    
    window.rejectProduct = async function(productId) {
        await supabase.from('produtos').update({ status: 'rejected' }).eq('id', productId);
        await loadStats();
        if (currentTab === 'pending') loadPendingProducts();
        alert('Produto rejeitado');
    };
    
    window.banProduct = async function(productId) {
        if (!confirm('Banir este produto?')) return;
        await supabase.from('produtos').update({ status: 'banned' }).eq('id', productId);
        await loadStats();
        if (currentTab === 'products') loadAllProducts();
        alert('Produto banido');
    };
    
    window.unbanProduct = async function(productId) {
        await supabase.from('produtos').update({ status: 'active' }).eq('id', productId);
        await loadStats();
        if (currentTab === 'products') loadAllProducts();
        alert('Produto reativado');
    };
    
    window.approveWithdrawal = async function(saqueId) {
        if (!confirm('Confirmar APROVACAO deste saque? O valor sera enviado para o vendedor.')) return;
        var error = (await supabase.from('saques').update({ status: 'aprovado' }).eq('id', saqueId)).error;
        if (!error) {
            alert('Saque aprovado com sucesso!');
            if (currentTab === 'withdrawals') loadWithdrawals();
        } else {
            alert('Erro ao aprovar: ' + error.message);
        }
    };
    
    window.rejectWithdrawal = async function(saqueId) {
        if (!confirm('Confirmar REJEICAO deste saque?')) return;
        var error = (await supabase.from('saques').update({ status: 'rejeitado' }).eq('id', saqueId)).error;
        if (!error) {
            alert('Saque rejeitado!');
            if (currentTab === 'withdrawals') loadWithdrawals();
        } else {
            alert('Erro ao rejeitar: ' + error.message);
        }
    };
    
    window.viewProduct = async function(productId) {
        var result = await supabase.from('produtos').select('*').eq('id', productId).single();
        var p = result.data;
        var modalContent = document.getElementById('modalContent');
        modalContent.innerHTML = 
            '<img src="' + (p.imagem || 'https://placehold.co/400x200/1a1a22/fff?text=Sem+Capa') + '" class="product-img">' +
            '<div class="info-row"><div class="info-label">Titulo</div><div class="info-value">' + (p.nome || '—') + '</div></div>' +
            '<div class="info-row"><div class="info-label">Descricao</div><div class="info-value">' + (p.descricao_curta || 'Sem descricao') + '</div></div>' +
            '<div class="info-row"><div class="info-label">Preco</div><div class="info-value">' + (p.preco || 0).toLocaleString('pt-MZ') + ' MZN</div></div>' +
            '<div class="info-row"><div class="info-label">Link</div><div class="info-value"><code>' + (p.link_produto || '—') + '</code></div></div>' +
            '<div class="info-row"><div class="info-label">Status</div><div class="info-value"><span class="badge">' + (p.status || 'PENDING') + '</span></div></div>';
        document.getElementById('productModal').style.display = 'flex';
    };
    
    window.closeProductModal = function() { document.getElementById('productModal').style.display = 'none'; };
    
    async function switchTab(tab) {
        currentTab = tab;
        document.getElementById('tableContainer').innerHTML = '<div class="loader"><i class="fas fa-spinner fa-pulse"></i> Carregando...</div>';
        if (tab === 'users') await loadUsers();
        else if (tab === 'products') await loadAllProducts();
        else if (tab === 'pending') await loadPendingProducts();
        else if (tab === 'sales') await loadSales();
        else if (tab === 'withdrawals') await loadWithdrawals();
    }
    
    function setupNavigation() {
        var navItems = document.querySelectorAll('.nav-item');
        for (var i = 0; i < navItems.length; i++) {
            var item = navItems[i];
            item.addEventListener('click', (function(item) {
                return function() {
                    var allItems = document.querySelectorAll('.nav-item');
                    for (var j = 0; j < allItems.length; j++) {
                        allItems[j].classList.remove('active');
                    }
                    item.classList.add('active');
                    switchTab(item.dataset.tab);
                };
            })(item));
        }
        
        document.getElementById('refreshBtn').onclick = function() { 
            if (currentTab === 'users') loadUsers();
            else if (currentTab === 'products') loadAllProducts();
            else if (currentTab === 'pending') loadPendingProducts();
            else if (currentTab === 'sales') loadSales();
            else if (currentTab === 'withdrawals') loadWithdrawals();
        };
        
        document.getElementById('logoutBtn').onclick = async function() { 
            await supabase.auth.signOut(); 
            window.location.href = 'acesso.html'; 
        };
    }
    
    init();
})();
</script>
</body>
</html>
