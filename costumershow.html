<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ZentroPay — Produto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0c; font-family: 'Inter', sans-serif; padding: 20px; color: #fff; min-height: 100vh; }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none; z-index: 0;
        }
        .container { max-width: 900px; margin: 0 auto; position: relative; z-index: 2; }
        
        .navbar {
            background: rgba(18, 18, 24, 0.8); backdrop-filter: blur(16px);
            border-radius: 60px; padding: 12px 24px; margin-bottom: 32px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .logo-area { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo-image { width: 32px; height: 32px; object-fit: contain; }
        .logo-text { font-weight: 700; font-size: 16px; background: linear-gradient(135deg, #fff, #a0a0c0); -webkit-background-clip: text; color: transparent; }

        .banner-container { width: 100%; border-radius: 24px; overflow: hidden; margin-bottom: 32px; background: rgba(0,0,0,0.3); }
        .banner-img { width: 100%; max-height: 250px; object-fit: cover; }
        .hidden { display: none; }

        .urgent-counter {
            background: linear-gradient(135deg, #dc2626, #991b1b);
            border-radius: 60px; padding: 12px 24px; text-align: center; margin-bottom: 24px;
        }
        .urgent-timer { font-size: 28px; font-weight: 800; font-family: monospace; }

        .produto-card {
            background: rgba(18, 18, 24, 0.6); backdrop-filter: blur(20px);
            border-radius: 32px; border: 1px solid rgba(255, 255, 255, 0.08);
            overflow: hidden; margin-bottom: 24px;
        }
        .produto-main { display: flex; gap: 32px; padding: 32px; flex-wrap: wrap; }
        .produto-imagem { flex: 1; min-width: 200px; }
        .produto-imagem img { width: 100%; border-radius: 20px; background: rgba(0,0,0,0.3); }
        .produto-info { flex: 2; }
        .produto-categoria { display: inline-block; background: rgba(16,185,129,0.15); color: #10b981; padding: 4px 12px; border-radius: 40px; font-size: 11px; font-weight: 600; margin-bottom: 12px; }
        .produto-nome { font-size: 28px; font-weight: 800; margin-bottom: 12px; }
        .produto-preco { font-size: 32px; font-weight: 800; color: #10b981; margin-bottom: 16px; }
        .produto-serial { font-size: 12px; color: rgba(255,255,255,0.4); font-family: monospace; padding: 8px 12px; background: rgba(0,0,0,0.3); border-radius: 12px; display: inline-block; }
        
        .form-section { padding: 24px 32px; border-top: 1px solid rgba(255,255,255,0.08); background: rgba(0,0,0,0.2); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        .form-group label { display: block; font-size: 11px; font-weight: 600; margin-bottom: 6px; color: rgba(255,255,255,0.5); }
        .form-group input { width: 100%; padding: 12px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; }
        
        .btn-whatsapp { width: 100%; background: #25D366; border: none; padding: 16px; border-radius: 44px; color: white; font-weight: 700; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }

        .depoimentos-section { background: rgba(18, 18, 24, 0.6); border-radius: 32px; padding: 32px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 24px; }
        .depoimento-card { background: rgba(0,0,0,0.3); border-radius: 20px; padding: 20px; margin-bottom: 12px; }
        
        .error-state { text-align: center; padding: 60px; background: rgba(18,18,24,0.6); border-radius: 32px; }
        .spinner { text-align: center; padding: 60px; }

        @media (max-width: 640px) { .produto-main { padding: 20px; flex-direction: column; } .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <nav class="navbar">
        <div class="logo-area" onclick="window.location.href='dashboard.html'">
            <img src="ei_1777492717837-removebg-preview.png" class="logo-image">
            <span class="logo-text">ZentroPay</span>
        </div>
    </nav>
    <div id="produto-content">
        <div class="spinner"><i class="fas fa-spinner fa-spin"></i><p>Carregando produto...</p></div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://pbxufurblxmbzflaiqmh.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBieHVmdXJibHhtYnpmbGFpcW1oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MDY5MjcsImV4cCI6MjA5MzE4MjkyN30.wDSSnT4QWm1HK9dQDcXutyM271Qsg5kmFqQZFytA4pA";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let urgentInterval = null;

    function getUrlParams() {
        return { id: new URLSearchParams(window.location.search).get('id') };
    }

    async function carregarDados() {
        const { id } = getUrlParams();
        const container = document.getElementById('produto-content');

        if (!id) {
            container.innerHTML = `<div class="error-state"><h2>ID do produto ausente</h2></div>`;
            return;
        }

        // Busca Produto
        const { data: produto, error } = await supabase.from('produtos').select('*').eq('id', id).single();
        
        if (error || !produto) {
            container.innerHTML = `<div class="error-state"><h2>Produto não encontrado</h2></div>`;
            return;
        }

        // Busca Depoimentos
        const { data: depoimentos } = await supabase.from('depoimentos_texto').select('*').eq('produto_id', id);

        renderizar(produto, depoimentos || []);
        
        // Incrementa visualização
        await supabase.from('produtos').update({ visualizacoes: (produto.visualizacoes || 0) + 1 }).eq('id', id);
    }

    function renderizar(produto, depoimentos) {
        const container = document.getElementById('produto-content');
        const precoNum = parseFloat(produto.preco) || 0;
        const precoFormatado = precoNum.toLocaleString('pt-MZ');

        container.innerHTML = `
            ${produto.banner ? `<div class="banner-container"><img src="${produto.banner}" class="banner-img"></div>` : ''}
            
            <div id="urgent-container"></div>

            <div class="produto-card">
                <div class="produto-main">
                    <div class="produto-imagem">
                        <img src="${produto.imagem}" onerror="this.src='https://placehold.co/400x400?text=Sem+Imagem'">
                    </div>
                    <div class="produto-info">
                        <div class="produto-categoria"><i class="fas fa-tag"></i> ${produto.categoria}</div>
                        <h1 class="produto-nome">${produto.nome}</h1>
                        <div class="produto-preco">${precoFormatado} MZN</div>
                        <div class="produto-serial"><i class="fas fa-barcode"></i> ${produto.serial}</div>
                        <p style="margin-top:15px; color:rgba(255,255,255,0.7)">${produto.descricao_curta}</p>
                    </div>
                </div>

                <div class="form-section">
                    <h3 style="margin-bottom:20px"><i class="fas fa-shopping-cart"></i> Finalizar Pedido</h3>
                    <form id="purchase-form">
                        <div class="form-row">
                            <div class="form-group"><label>NOME COMPLETO</label><input type="text" id="c-nome" required></div>
                            <div class="form-group"><label>EMAIL</label><input type="email" id="c-email" required></div>
                        </div>
                        <div class="form-row">
                            <div class="form-group"><label>WHATSAPP</label><input type="tel" id="c-tel" required></div>
                            <div class="form-group"><label>CIDADE/ENDEREÇO</label><input type="text" id="c-end"></div>
                        </div>
                        <button type="submit" class="btn-whatsapp"><i class="fab fa-whatsapp"></i> COMPRAR VIA WHATSAPP</button>
                    </form>
                </div>
            </div>

            <div class="depoimentos-section">
                <h3><i class="fas fa-star"></i> Avaliações</h3>
                <div style="margin-top:20px">
                    ${depoimentos.length === 0 ? '<p>Nenhuma avaliação ainda.</p>' : depoimentos.map(d => `
                        <div class="depoimento-card">
                            <strong>${d.cliente_nome}</strong> <span style="color:#f59e0b">${'⭐'.repeat(d.stars)}</span>
                            <p style="font-size:14px; margin-top:5px; color:rgba(255,255,255,0.8)">${d.depoimento}</p>
                        </div>
                    `).join('')}
                </div>
            </div>

            <div class="produto-card" style="padding:20px; text-align:center">
                <p style="font-size:12px; margin-bottom:15px">Escaneie para compartilhar:</p>
                <div id="qrcode" style="display:flex; justify-content:center"></div>
            </div>
        `;

        // Lógica do Contador
        if (produto.urgent_enabled) {
            const urgentDiv = document.getElementById('urgent-container');
            urgentDiv.innerHTML = `<div class="urgent-counter"><div class="urgent-timer" id="u-timer">--:--</div><p style="font-size:10px">OFERTA EXPIRA EM BREVE</p></div>`;
            let tempo = (produto.urgent_minutes || 5) * 60;
            setInterval(() => {
                if (tempo <= 0) return;
                tempo--;
                const m = Math.floor(tempo / 60);
                const s = tempo % 60;
                document.getElementById('u-timer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }, 1000);
        }

        // Lógica do QR Code
        new QRCode(document.getElementById("qrcode"), { text: window.location.href, width: 120, height: 120 });

        // Envio do Formulário
        document.getElementById('purchase-form').onsubmit = async (e) => {
            e.preventDefault();
            const nome = document.getElementById('c-nome').value;
            const tel = document.getElementById('c-tel').value;

            // Salva Lead
            await supabase.from('leads').insert([{
                produto_id: produto.id,
                cliente_nome: nome,
                cliente_email: document.getElementById('c-email').value,
                cliente_telefone: tel,
                cliente_endereco: document.getElementById('c-end').value
            }]);

            // Redireciona WhatsApp
            const msg = encodeURIComponent(`Olá! Gostaria de comprar o produto: ${produto.nome}\nValor: ${precoFormatado} MZN\nMeu Nome: ${nome}`);
            window.open(`https://wa.me/${produto.contacto_vendedor.replace(/\D/g,'')}?text=${msg}`, '_blank');
        };
    }

    carregarDados();
</script>
</body>
</html>
