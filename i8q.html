<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ZentroPay — Dashboard</title>
    <link rel="icon" type="image/png" href="ei_1777492717837-removebg-preview.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-deep: #050505;
            --glass-core: rgba(15, 15, 20, 0.85);
            --accent: #a855f7;
            --accent-glow: rgba(168, 85, 247, 0.4);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.4);
            --border: rgba(255, 255, 255, 0.06);
            --success: #10b981;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            background: var(--bg-deep);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Grid Background animado do acesso.html */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(168, 85, 247, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(168, 85, 247, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        .aura {
            position: fixed;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.08) 0%, transparent 70%);
            top: -150px; right: -150px;
            filter: blur(80px);
            z-index: -1;
        }

        /* Navbar Glassmorphism */
        .navbar {
            background: var(--glass-core);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            padding: 15px 30px;
            position: fixed;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1200px;
            border-radius: 100px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .logo-area img { width: 35px; filter: drop-shadow(0 0 10px var(--accent-glow)); }

        .user-area { display: flex; gap: 12px; }
        .nav-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: white; transition: 0.3s;
        }
        .nav-btn:hover { background: var(--accent); border-color: var(--accent); }

        /* Sidebar Melhorada */
        .sidebar {
            position: fixed;
            top: 0; right: -320px;
            width: 300px; height: 100vh;
            background: #0a0a0f;
            border-left: 1px solid var(--border);
            z-index: 2000;
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 40px 20px;
        }
        .sidebar.open { right: 0; }

        .profile-section { text-align: center; margin-bottom: 40px; }
        .profile-avatar {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, var(--accent), #7c3aed);
            border-radius: 20px;
            margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: 900;
            box-shadow: 0 10px 20px var(--accent-glow);
        }

        .menu-item {
            display: flex; align-items: center; gap: 15px;
            padding: 14px 20px;
            border-radius: 15px;
            color: var(--text-dim);
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 5px;
        }
        .menu-item:hover { background: rgba(168, 85, 247, 0.1); color: white; }
        .menu-item svg { width: 18px; height: 18px; fill: currentColor; }
        
        .badge-new {
            background: var(--accent);
            color: white;
            font-size: 9px;
            padding: 2px 8px;
            border-radius: 50px;
            margin-left: auto;
            font-weight: 900;
            letter-spacing: 1px;
        }

        /* Main Content */
        .main-content {
            padding-top: 120px;
            max-width: 500px;
            margin: 0 auto;
            padding-bottom: 50px;
        }

        .resumo-header h1 { font-size: 26px; font-weight: 900; letter-spacing: -1px; margin-bottom: 5px; }
        .resumo-header p { color: var(--text-dim); font-size: 14px; }

        /* Cards High-End */
        .card-metrica {
            background: var(--glass-core);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 25px;
            margin: 25px 0;
            position: relative;
            overflow: hidden;
        }
        .card-destaque { border-color: var(--accent); }
        .card-destaque::after {
            content: ''; position: absolute; top: 0; right: 0;
            width: 100px; height: 100px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            z-index: -1;
        }

        .metric-title { font-size: 10px; font-weight: 800; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }
        .metric-value { font-size: 32px; font-weight: 900; margin-top: 5px; }

        .row-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 12px; }
        .card-pequeno {
            background: var(--glass-core);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
        }
        .card-pequeno .metric-value { font-size: 18px; }

        .pedidos-section {
            background: var(--glass-core);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 25px;
            margin-top: 30px;
        }
        .pedido-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .sidebar-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px); z-index: 1999; display: none;
        }
        .sidebar-overlay.show { display: block; }
    </style>
</head>
<body>
    <div class="aura"></div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <nav class="navbar">
        <div class="logo-area" onclick="location.reload()">
            <img src="ei_1777492717837-removebg-preview.png">
        </div>
        <div class="user-area">
            <button class="nav-btn" id="themeToggle"><i class="fas fa-moon"></i></button>
            <button class="nav-btn" id="menuIcon"><i class="fas fa-bars-staggered"></i></button>
        </div>
    </nav>

    <div class="sidebar" id="sidebar">
        <div class="profile-section">
            <div class="profile-avatar" id="profile-avatar">V</div>
            <h2 id="sidebar-name" style="font-size: 16px;">Vendedor</h2>
            <p id="sidebar-email" style="font-size: 11px; color: var(--text-dim);"></p>
        </div>
        
        <div class="sidebar-menu">
            <div class="menu-item" onclick="window.location.href='e-commerce.html'">
                <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
                <span>E-COMMERCE</span>
            </div>

            <div class="menu-item" onclick="window.location.href='infoproductos.html'">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                <span>INFO-PRODUTOS</span>
                <span class="badge-new">Novo</span>
            </div>

            <div class="menu-item" onclick="window.location.href='createproduct.html'">
                <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                <span>Criar Produto</span>
            </div>
            
            <div class="menu-item" onclick="window.location.href='loja.html'">
                <svg viewBox="0 0 24 24"><path d="M20 4H4v2h16V4zm1 10v-2l-1-5H4l-1 5v2h1v6h10v-6h4v6h2v-6h1zM9 18H5v-4h4v4z"/></svg>
                <span>Ver Loja</span>
            </div>

            <div style="height: 1px; background: var(--border); margin: 20px 0;"></div>
            
            <div class="menu-item" id="logoutBtn" style="color: #ef4444;">
                <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
                <span>Encerrar Painel</span>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="resumo-header">
            <h1>Analytics Center</h1>
            <p>Bem-vindo, <span id="user-name" style="color:white; font-weight: 700;">Vendedor</span></p>
        </div>

        <div class="card-metrica card-destaque">
            <div class="metric-title">Receita Acumulada</div>
            <div class="metric-value" id="receita-total">0 MZN</div>
        </div>

        <div class="row-cards">
            <div class="card-pequeno"><div class="metric-title">Vendas</div><div class="metric-value" id="vendas-total">0</div></div>
            <div class="card-pequeno"><div class="metric-title">Pendente</div><div class="metric-value" id="vendas-pendentes">0</div></div>
            <div class="card-pequeno"><div class="metric-title">Estoque</div><div class="metric-value" id="produtos-total">0</div></div>
        </div>
        <div class="row-cards">
            <div class="card-pequeno"><div class="metric-title">Leads</div><div class="metric-value" id="leads-total">0</div></div>
            <div class="card-pequeno"><div class="metric-title">Visitas</div><div class="metric-value" id="visualizacoes-total">0</div></div>
            <div class="card-pequeno"><div class="metric-title">Clicks</div><div class="metric-value" id="cliques-total">0</div></div>
        </div>

        <div class="pedidos-section">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px; align-items:center;">
                <h3 style="font-size:14px; letter-spacing:1px;">FLUXO DE CAIXA</h3>
                <a href="meus-pedidos.html" style="font-size:10px; color:var(--accent); text-decoration:none; font-weight:800;">HISTÓRICO →</a>
            </div>
            <div id="pedidos-list"></div>
        </div>
    </div>

    <script>
        (function() {
            const SUPABASE_URL = "https://pbxufurblxmbzflaiqmh.supabase.co";
            const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBieHVmdXJibHhtYnpmbGFpcW1oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MDY5MjcsImV4cCI6MjA5MzE4MjkyN30.wDSSnT4QWm1HK9dQDcXutyM271Qsg5kmFqQZFytA4pA";
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            let usuarioAtual = null;

            // Tema
            let theme = localStorage.getItem('zentropay_theme') || 'dark';
            function setTheme(t) {
                document.body.classList[t === 'light' ? 'add' : 'remove']('light');
                localStorage.setItem('zentropay_theme', t);
            }
            setTheme(theme);

            // Sidebar Logic
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            
            document.getElementById('menuIcon').onclick = () => {
                sidebar.classList.add('open');
                overlay.classList.add('show');
            };
            overlay.onclick = () => {
                sidebar.classList.remove('open');
                overlay.classList.remove('show');
            };

            document.getElementById('logoutBtn').onclick = async () => {
                await supabase.auth.signOut();
                window.location.href = 'acesso.html';
            };

            async function carregarDados() {
                const { data: { session } } = await supabase.auth.getSession();
                if (!session) { window.location.href = 'acesso.html'; return; }
                
                usuarioAtual = session.user;
                const nome = usuarioAtual.user_metadata?.nome || "User";
                document.getElementById('user-name').innerText = nome;
                document.getElementById('sidebar-name').innerText = nome;
                document.getElementById('sidebar-email').innerText = usuarioAtual.email;

                // Métricas
                const { data: produtos } = await supabase.from('produtos').select('*').eq('vendedor_id', usuarioAtual.id);
                if (produtos) {
                    document.getElementById('produtos-total').innerText = produtos.length;
                    document.getElementById('visualizacoes-total').innerText = produtos.reduce((s, p) => s + (p.visualizacoes || 0), 0);
                    document.getElementById('cliques-total').innerText = produtos.reduce((s, p) => s + (p.cliques || 0), 0);

                    const ids = produtos.map(p => p.id);
                    const { data: pedidos } = await supabase.from('pedidos').select('*').in('produto_id', ids).order('criado_em', {ascending: false});
                    
                    if (pedidos) {
                        const pagos = pedidos.filter(p => p.status === 'pago');
                        document.getElementById('receita-total').innerText = pagos.reduce((s, p) => s + (p.valor || 0), 0).toLocaleString() + ' MZN';
                        document.getElementById('vendas-total').innerText = pagos.length;
                        document.getElementById('vendas-pendentes').innerText = pedidos.length - pagos.length;

                        document.getElementById('pedidos-list').innerHTML = pedidos.slice(0, 4).map(p => `
                            <div class="pedido-card">
                                <div style="display:flex; justify-content:space-between; margin-bottom:5px">
                                    <span style="font-weight:700; font-size:13px">${p.cliente_nome || 'Order'}</span>
                                    <span style="font-size:10px; font-weight:900; color:${p.status === 'pago' ? 'var(--success)' : 'var(--warning)'}">${p.status.toUpperCase()}</span>
                                </div>
                                <div style="display:flex; justify-content:space-between; font-size:11px; color:var(--text-dim)">
                                    <span>${p.produto_nome || 'Produto'}</span>
                                    <span style="color:white; font-weight:700">${p.valor.toLocaleString()} MZN</span>
                                </div>
                            </div>
                        `).join('');
                    }
                }
            }

            carregarDados();
            setInterval(carregarDados, 60000);
        })();
    </script>
</body>
</html>
