<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Vantix — Visualizar Produto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0c;
            font-family: 'Inter', sans-serif;
            padding: 20px;
            color: #fff;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* Navbar */
        .navbar {
            background: rgba(18, 18, 24, 0.8);
            backdrop-filter: blur(16px);
            border-radius: 60px;
            padding: 12px 24px;
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .logo-image {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .logo-text {
            font-weight: 700;
            font-size: 16px;
            background: linear-gradient(135deg, #fff, #a0a0c0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .btn-back {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 18px;
            border-radius: 40px;
            color: rgba(255,255,255,0.7);
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-back:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        /* Banner condicional */
        .banner-container {
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 32px;
            background: rgba(0,0,0,0.3);
        }

        .banner-img {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
        }

        .hidden {
            display: none;
        }

        /* Produto Card */
        .produto-card {
            background: rgba(18, 18, 24, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow: hidden;
            margin-bottom: 24px;
        }

        .produto-main {
            display: flex;
            gap: 32px;
            padding: 32px;
            flex-wrap: wrap;
        }

        .produto-imagem {
            flex: 1;
            min-width: 200px;
        }

        .produto-imagem img {
            width: 100%;
            border-radius: 20px;
            background: rgba(0,0,0,0.3);
        }

        .produto-info {
            flex: 2;
        }

        .produto-categoria {
            display: inline-block;
            background: rgba(16,185,129,0.15);
            color: #10b981;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .produto-nome {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .produto-preco {
            font-size: 32px;
            font-weight: 800;
            color: #10b981;
            margin-bottom: 16px;
        }

        .produto-serial {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            font-family: monospace;
            margin-bottom: 20px;
            padding: 8px 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            display: inline-block;
        }

        .stats-row {
            display: flex;
            gap: 20px;
            margin: 16px 0;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
        }

        .stat-value {
            font-weight: 700;
            color: #10b981;
        }

        .produto-descricao {
            margin: 20px 0;
            line-height: 1.6;
            color: rgba(255,255,255,0.7);
        }

        .produto-descricao h4 {
            color: white;
            margin-bottom: 8px;
            font-size: 14px;
        }

        /* Formulário do Cliente */
        .form-section {
            padding: 24px 32px;
            border-top: 1px solid rgba(255,255,255,0.08);
            background: rgba(0,0,0,0.2);
        }

        .form-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
            color: rgba(255,255,255,0.6);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            font-size: 14px;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #10b981;
        }

        .btn-whatsapp {
            width: 100%;
            background: #25D366;
            border: none;
            padding: 14px;
            border-radius: 44px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .btn-whatsapp:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        /* Depoimentos */
        .depoimentos-section {
            background: rgba(18, 18, 24, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 32px;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Depoimentos em Texto */
        .depoimentos-texto {
            margin-bottom: 32px;
        }

        .depoimento-card {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .depoimento-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .depoimento-nome {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stars {
            color: #f59e0b;
            font-size: 14px;
        }

        .depoimento-texto {
            color: rgba(255,255,255,0.7);
            line-height: 1.5;
            font-size: 14px;
        }

        .depoimento-data {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            margin-top: 8px;
        }

        /* Depoimentos em Imagem */
        .depoimentos-imagem {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 16px;
        }

        .depoimento-img-card {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .depoimento-img-card:hover {
            transform: scale(1.02);
        }

        .depoimento-img {
            width: 100%;
            border-radius: 12px;
            max-height: 300px;
            object-fit: cover;
        }

        .depoimento-img-legenda {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-top: 8px;
            text-align: center;
        }

        /* Modal para imagem */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 16px;
        }

        .modal .close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            cursor: pointer;
            color: white;
        }

        /* Link Section */
        .link-section {
            padding: 24px;
            border-top: 1px solid rgba(255,255,255,0.08);
            background: rgba(0,0,0,0.2);
        }

        .current-link {
            background: rgba(0,0,0,0.5);
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 12px;
            font-family: monospace;
            word-break: break-all;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .btn-copy {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }

        .error-state {
            text-align: center;
            padding: 60px 20px;
            background: rgba(18, 18, 24, 0.6);
            border-radius: 32px;
        }

        @media (max-width: 640px) {
            .produto-main { padding: 20px; flex-direction: column; }
            .form-row { grid-template-columns: 1fr; }
            .depoimentos-imagem { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="logo-area" onclick="window.location.href='dashboard.html'">
                <img src="ei_1777492717837-removebg-preview.png" alt="Vantix" class="logo-image">
                <span class="logo-text">Vantix</span>
            </div>
            <button class="btn-back" onclick="window.location.href='e-commerce.html'">
                <i class="fas fa-arrow-left"></i> Voltar Loja
            </button>
        </nav>

        <div id="produto-content">
            <div style="text-align: center; padding: 60px;">
                <i class="fas fa-spinner fa-spin" style="font-size: 48px;"></i>
                <p style="margin-top: 16px;">Carregando...</p>
            </div>
        </div>
    </div>

    <!-- Modal para imagem -->
    <div id="image-modal" class="modal" onclick="closeModal()">
        <span class="close">&times;</span>
        <img id="modal-image" src="">
    </div>

    <script>
        // Produtos e depoimentos
        let produtos = JSON.parse(localStorage.getItem('vantix_produtos_ecommerce')) || [];
        let depoimentosTexto = JSON.parse(localStorage.getItem('vantix_depoimentos_texto')) || [];
        let depoimentosImagem = JSON.parse(localStorage.getItem('vantix_depoimentos_imagem')) || [];

        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return { id: params.get('id'), hash: params.get('hash') };
        }

        function getCurrentLink() { return window.location.href; }

        // Incrementar visualização
        function incrementarVisualizacao(produtoId) {
            const index = produtos.findIndex(p => p.id == produtoId);
            if (index !== -1) {
                produtos[index].visualizacoes = (produtos[index].visualizacoes || 0) + 1;
                localStorage.setItem('vantix_produtos_ecommerce', JSON.stringify(produtos));
            }
        }

        // Incrementar clique
        function incrementarClique(produtoId) {
            const index = produtos.findIndex(p => p.id == produtoId);
            if (index !== -1) {
                produtos[index].cliques = (produtos[index].cliques || 0) + 1;
                localStorage.setItem('vantix_produtos_ecommerce', JSON.stringify(produtos));
            }
        }

        // Salvar lead
        function salvarLead(produto, dados) {
            const leadsKey = `vantix_leads_${produto.id}`;
            const leads = JSON.parse(localStorage.getItem(leadsKey)) || [];
            leads.push({
                id: Date.now(),
                ...dados,
                produto_nome: produto.nome,
                produto_serial: produto.serial,
                data: new Date().toISOString()
            });
            localStorage.setItem(leadsKey, JSON.stringify(leads));
        }

        function mostrarProduto() {
            const { id, hash } = getUrlParams();
            const container = document.getElementById('produto-content');

            if (!id) {
                mostrarErro(container, 'Produto não especificado');
                return;
            }

            const produto = produtos.find(p => p.id == id);
            if (!produto) {
                mostrarErro(container, 'Produto não encontrado');
                return;
            }

            incrementarVisualizacao(produto.id);
            renderizarProduto(container, produto);
        }

        function mostrarErro(container, titulo) {
            container.innerHTML = `<div class="error-state"><i class="fas fa-exclamation-triangle"></i><h2>${titulo}</h2><button class="btn-back" onclick="window.location.href='e-commerce.html'">Voltar</button></div>`;
        }

        function renderizarProduto(container, produto) {
            const currentUrl = getCurrentLink();
            const precoFormatado = produto.preco.toLocaleString('pt-MZ', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
            const visualizacoes = produto.visualizacoes || 0;
            const cliques = produto.cliques || 0;

            // Filtrar depoimentos deste produto
            const depoText = depoimentosTexto.filter(d => d.produto_id == produto.id);
            const depoImg = depoimentosImagem.filter(d => d.produto_id == produto.id);

            container.innerHTML = `
                <!-- Banner condicional -->
                <div class="banner-container ${!produto.banner ? 'hidden' : ''}">
                    ${produto.banner ? `<img src="${produto.banner}" class="banner-img" alt="Banner">` : ''}
                </div>

                <div class="produto-card">
                    <div class="produto-main">
                        <div class="produto-imagem">
                            <img src="${produto.imagem}" alt="${produto.nome}">
                        </div>
                        <div class="produto-info">
                            <div class="produto-categoria"><i class="fas fa-tag"></i> ${produto.categoria || 'Produto'}</div>
                            <h1 class="produto-nome">${produto.nome}</h1>
                            <div class="produto-preco">${precoFormatado} MZN</div>
                            <div class="produto-serial"><i class="fas fa-barcode"></i> Série: ${produto.serial}</div>
                            
                            <div class="stats-row">
                                <div class="stat-item"><i class="fas fa-eye"></i> <span class="stat-value">${visualizacoes}</span> visualizações</div>
                                <div class="stat-item"><i class="fas fa-mouse-pointer"></i> <span class="stat-value">${cliques}</span> cliques</div>
                            </div>

                            <div class="produto-descricao">
                                <h4><i class="fas fa-info-circle"></i> Descrição</h4>
                                <p>${produto.descricao_curta || 'Sem descrição'}</p>
                                ${produto.descricao_longa ? `<p style="margin-top: 12px;">${produto.descricao_longa}</p>` : ''}
                            </div>
                        </div>
                    </div>

                    <!-- Formulário do Cliente -->
                    <div class="form-section">
                        <div class="form-title"><i class="fas fa-user-check"></i> Preencha seus dados para comprar</div>
                        <form id="lead-form">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>NOME COMPLETO *</label>
                                    <input type="text" id="lead-nome" placeholder="Seu nome" required>
                                </div>
                                <div class="form-group">
                                    <label>EMAIL *</label>
                                    <input type="email" id="lead-email" placeholder="seu@email.com" required>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>TELEFONE/WHATSAPP *</label>
                                    <input type="tel" id="lead-telefone" placeholder="84 123 4567" required>
                                </div>
                                <div class="form-group">
                                    <label>ENDEREÇO DE ENTREGA</label>
                                    <input type="text" id="lead-endereco" placeholder="Cidade, bairro, rua...">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>MENSAGEM (opcional)</label>
                                <textarea id="lead-mensagem" rows="2" placeholder="Alguma observação?"></textarea>
                            </div>
                            <button type="submit" class="btn-whatsapp" id="submit-lead">
                                <i class="fab fa-whatsapp"></i> Enviar e Continuar no WhatsApp
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Depoimentos em Texto -->
                <div class="depoimentos-section">
                    <div class="section-title"><i class="fas fa-comment-dots"></i> Depoimentos de Clientes</div>
                    
                    <div class="depoimentos-texto">
                        ${depoText.length === 0 ? '<p style="text-align: center; color: rgba(255,255,255,0.4); padding: 20px;">Nenhum depoimento ainda. Seja o primeiro!</p>' : 
                            depoText.map(d => `
                            <div class="depoimento-card">
                                <div class="depoimento-header">
                                    <div class="depoimento-nome"><i class="fas fa-user-circle"></i> ${d.nome}</div>
                                    <div class="stars">${'⭐'.repeat(d.stars)}</div>
                                </div>
                                <div class="depoimento-texto">"${d.texto}"</div>
                                <div class="depoimento-data">${new Date(d.data).toLocaleDateString('pt-MZ')}</div>
                            </div>
                        `).join('')}
                    </div>

                    <!-- Depoimentos em Imagem -->
                    <div class="section-title" style="margin-top: 32px;"><i class="fas fa-image"></i> Capturas de Conversas</div>
                    <div class="depoimentos-imagem">
                        ${depoImg.length === 0 ? '<p style="text-align: center; color: rgba(255,255,255,0.4); padding: 20px;">Nenhuma imagem de depoimento ainda.</p>' : 
                            depoImg.map(img => `
                            <div class="depoimento-img-card" onclick="openImageModal('${img.imagem}')">
                                <img src="${img.imagem}" class="depoimento-img" alt="Depoimento">
                                <div class="depoimento-img-legenda">${img.legenda || 'Depoimento de cliente'}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <!-- Link e QR Code -->
                <div class="produto-card">
                    <div class="link-section">
                        <div class="current-link">
                            <span style="word-break: break-all; flex: 1;">${currentUrl}</span>
                            <button class="btn-copy" onclick="copiarLink()"><i class="fas fa-copy"></i> Copiar</button>
                        </div>
                        <div style="text-align: center; margin-top: 20px;" id="qrcode-container"></div>
                    </div>
                </div>
            `;

            // Gerar QR Code
            setTimeout(() => {
                const qrContainer = document.getElementById('qrcode-container');
                if (qrContainer && typeof QRCode !== 'undefined') {
                    qrContainer.innerHTML = '';
                    new QRCode(qrContainer, { text: currentUrl, width: 120, height: 120 });
                }
            }, 100);

            // Evento do formulário
            const form = document.getElementById('lead-form');
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                
                const nome = document.getElementById('lead-nome').value.trim();
                const email = document.getElementById('lead-email').value.trim();
                const telefone = document.getElementById('lead-telefone').value.trim();
                const endereco = document.getElementById('lead-endereco').value.trim();
                const mensagem = document.getElementById('lead-mensagem').value.trim();

                if (!nome || !email || !telefone) {
                    alert('Preencha nome, email e telefone');
                    return;
                }

                // Salvar lead
                const lead = { nome, email, telefone, endereco, mensagem };
                salvarLead(produto, lead);
                incrementarClique(produto.id);

                // Montar mensagem WhatsApp
                const whatsappMsg = `*NOVO PEDIDO - VANTIX*%0A%0A` +
                    `*Produto:* ${produto.nome}%0A` +
                    `*Série:* ${produto.serial}%0A` +
                    `*Preço:* ${precoFormatado} MZN%0A%0A` +
                    `*Dados do Cliente:*%0A` +
                    `Nome: ${nome}%0A` +
                    `Email: ${email}%0A` +
                    `Telefone: ${telefone}%0A` +
                    `Endereço: ${endereco || 'Não informado'}%0A%0A` +
                    `*Mensagem:* ${mensagem || 'Sem mensagem adicional'}%0A%0A` +
                    `_Pedido via Cash on Delivery_`;

                const whatsappUrl = `https://wa.me/${produto.vendedor_contacto.replace(/\D/g, '')}?text=${whatsappMsg}`;
                window.open(whatsappUrl, '_blank');
                
                alert('✅ Dados enviados! Redirecionando para WhatsApp...');
            });
        }

        function copiarLink() {
            navigator.clipboard.writeText(window.location.href);
            alert('✅ Link copiado!');
        }

        function openImageModal(src) {
            const modal = document.getElementById('image-modal');
            const modalImg = document.getElementById('modal-image');
            modalImg.src = src;
            modal.classList.add('show');
        }

        function closeModal() {
            document.getElementById('image-modal').classList.remove('show');
        }

        mostrarProduto();
    </script>
</body>
    </html>
