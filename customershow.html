<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Vantix — Visualizar Produto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Temas */
        body.light {
            background: #f5f5f5;
            color: #1a1a1a;
        }
        body.light::before {
            background-image: linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
        }
        body.light .navbar,
        body.light .produto-card,
        body.light .depoimentos-section,
        body.light .form-section,
        body.light .link-section {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(16px);
            border-color: rgba(0,0,0,0.08);
        }
        body.light .produto-nome,
        body.light .section-title,
        body.light .form-title,
        body.light .produto-descricao h4 {
            color: #1a1a1a;
        }
        body.light .produto-descricao p,
        body.light .depoimento-texto {
            color: #4a4a4a;
        }
        body.light .produto-serial,
        body.light .depoimento-data {
            color: rgba(0,0,0,0.4);
        }
        body.light .form-group input,
        body.light .form-group textarea {
            background: rgba(0,0,0,0.05);
            border-color: rgba(0,0,0,0.1);
            color: #1a1a1a;
        }
        body.light .current-link {
            background: rgba(0,0,0,0.05);
        }
        body.light .btn-back,
        body.light .btn-copy {
            background: rgba(0,0,0,0.05);
            border-color: rgba(0,0,0,0.1);
            color: #1a1a1a;
        }
        body.light .btn-back:hover,
        body.light .btn-copy:hover {
            background: rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            padding: 20px;
            min-height: 100vh;
            transition: background 0.3s ease;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* Navbar */
        .navbar {
            background: rgba(18, 18, 24, 0.8);
            backdrop-filter: blur(16px);
            border-radius: 60px;
            padding: 12px 24px;
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .logo-image {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .logo-text {
            font-weight: 700;
            font-size: 16px;
            background: linear-gradient(135deg, #fff, #a0a0c0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Botão Tema */
        .theme-toggle {
            background: rgba(255,255,255,0.1);
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            margin-right: 12px;
        }
        .theme-toggle svg {
            width: 22px;
            height: 22px;
            fill: white;
        }
        body.light .theme-toggle {
            background: rgba(0,0,0,0.08);
        }
        body.light .theme-toggle svg {
            fill: #1a1a1a;
        }

        .btn-back {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 18px;
            border-radius: 40px;
            color: rgba(255,255,255,0.7);
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Banner condicional */
        .banner-container {
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 32px;
            background: rgba(0,0,0,0.3);
        }
        .banner-img { width: 100%; max-height: 250px; object-fit: cover; }
        .hidden { display: none; }

        /* Contador de Urgência */
        .urgent-counter {
            background: linear-gradient(135deg, #dc2626, #991b1b);
            border-radius: 60px;
            padding: 12px 24px;
            text-align: center;
            margin-bottom: 24px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.02); opacity: 0.95; }
            100% { transform: scale(1); opacity: 1; }
        }
        .urgent-text {
            font-weight: 800;
            font-size: 18px;
            color: white;
        }
        .urgent-timer {
            font-size: 28px;
            font-weight: 800;
            font-family: monospace;
            letter-spacing: 2px;
        }

        /* Produto Card */
        .produto-card {
            background: rgba(18, 18, 24, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow: hidden;
            margin-bottom: 24px;
        }

        .produto-main {
            display: flex;
            gap: 32px;
            padding: 32px;
            flex-wrap: wrap;
        }

        .produto-imagem {
            flex: 1;
            min-width: 200px;
        }
        .produto-imagem img {
            width: 100%;
            border-radius: 20px;
            background: rgba(0,0,0,0.3);
        }

        .produto-info { flex: 2; }
        .produto-categoria {
            display: inline-block;
            background: rgba(16,185,129,0.15);
            color: #10b981;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .produto-nome {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 12px;
        }
        .produto-preco {
            font-size: 32px;
            font-weight: 800;
            color: #10b981;
            margin-bottom: 16px;
        }
        .produto-serial {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            font-family: monospace;
            margin-bottom: 20px;
            padding: 8px 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            display: inline-block;
        }
        .produto-descricao {
            margin: 20px 0;
            line-height: 1.6;
            color: rgba(255,255,255,0.7);
        }
        .produto-descricao h4 {
            color: white;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .descricao-longa {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        /* Depoimentos */
        .depoimentos-section {
            background: rgba(18, 18, 24, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 32px;
            margin-bottom: 24px;
        }
        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .depoimentos-texto { margin-bottom: 32px; }
        .depoimento-card {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .depoimento-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .depoimento-nome {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stars { color: #f59e0b; font-size: 14px; }
        .depoimento-texto { color: rgba(255,255,255,0.7); line-height: 1.5; font-size: 14px; }
        .depoimento-data { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 8px; }

        .depoimentos-imagem {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 16px;
        }
        .depoimento-img-card {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .depoimento-img-card:hover { transform: scale(1.02); }
        .depoimento-img {
            width: 100%;
            border-radius: 12px;
            max-height: 300px;
            object-fit: cover;
        }
        .depoimento-img-legenda {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-top: 8px;
            text-align: center;
        }

        /* Formulário */
        .form-section {
            padding: 24px 32px;
            border-top: 1px solid rgba(255,255,255,0.08);
            background: rgba(0,0,0,0.2);
        }
        .form-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
            color: rgba(255,255,255,0.6);
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            font-size: 14px;
            color: white;
            font-family: 'Inter', sans-serif;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #10b981;
        }
        .btn-whatsapp {
            width: 100%;
            background: #25D366;
            border: none;
            padding: 14px;
            border-radius: 44px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Link Section */
        .link-section {
            padding: 24px;
            border-top: 1px solid rgba(255,255,255,0.08);
            background: rgba(0,0,0,0.2);
        }
        .current-link {
            background: rgba(0,0,0,0.5);
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 12px;
            font-family: monospace;
            word-break: break-all;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .btn-copy {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal.show { display: flex; }
        .modal img { max-width: 90%; max-height: 90%; border-radius: 16px; }
        .modal .close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            cursor: pointer;
            color: white;
        }

        .error-state {
            text-align: center;
            padding: 60px 20px;
            background: rgba(18, 18, 24, 0.6);
            border-radius: 32px;
        }

        @media (max-width: 640px) {
            .produto-main { padding: 20px; flex-direction: column; }
            .form-row { grid-template-columns: 1fr; }
            .depoimentos-imagem { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="logo-area" onclick="window.location.href='dashboard.html'">
                <img src="ei_1777492717837-removebg-preview.png" alt="Vantix" class="logo-image">
                <span class="logo-text">Vantix</span>
            </div>
            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>
                    </svg>
                </button>
                <button class="btn-back" onclick="window.location.href='e-commerce.html'">
                    <i class="fas fa-arrow-left"></i> Voltar
                </button>
            </div>
        </nav>

        <div id="produto-content">
            <div style="text-align: center; padding: 60px;">
                <i class="fas fa-spinner fa-spin" style="font-size: 48px;"></i>
                <p style="margin-top: 16px;">Carregando...</p>
            </div>
        </div>
    </div>

    <!-- Modal para imagem -->
    <div id="image-modal" class="modal" onclick="closeModal()">
        <span class="close">&times;</span>
        <img id="modal-image" src="">
    </div>

    <script>
        let produtos = JSON.parse(localStorage.getItem('vantix_produtos_ecommerce')) || [];
        let depoimentosTexto = JSON.parse(localStorage.getItem('vantix_depoimentos_texto')) || [];
        let depoimentosImagem = JSON.parse(localStorage.getItem('vantix_depoimentos_imagem')) || [];

        // Tema
        let currentTheme = localStorage.getItem('vantix_theme') || 'dark';
        function setTheme(theme) {
            if (theme === 'light') {
                document.body.classList.add('light');
            } else {
                document.body.classList.remove('light');
            }
            localStorage.setItem('vantix_theme', theme);
            currentTheme = theme;
        }
        function toggleTheme() {
            setTheme(currentTheme === 'dark' ? 'light' : 'dark');
        }
        document.getElementById('themeToggle').addEventListener('click', toggleTheme);
        setTheme(currentTheme);

        // Contador de urgência
        let urgentInterval = null;
        function startUrgentCounter(produto) {
            if (!produto.urgent_enabled || !produto.urgent_minutes) return null;
            
            let endTime = localStorage.getItem(`urgent_end_${produto.id}`);
            if (!endTime) {
                endTime = Date.now() + (produto.urgent_minutes * 60 * 1000);
                localStorage.setItem(`urgent_end_${produto.id}`, endTime);
            }
            
            function updateTimer() {
                const remaining = endTime - Date.now();
                if (remaining <= 0) {
                    clearInterval(interval);
                    const container = document.getElementById('urgent-container');
                    if (container) container.remove();
                    localStorage.removeItem(`urgent_end_${produto.id}`);
                    return null;
                }
                const minutes = Math.floor(remaining / 60000);
                const seconds = Math.floor((remaining % 60000) / 1000);
                document.getElementById('urgent-timer').innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
            
            const interval = setInterval(updateTimer, 1000);
            updateTimer();
            return interval;
        }

        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return { id: params.get('id'), hash: params.get('hash') };
        }

        function getCurrentLink() { return window.location.href; }

        function salvarLead(produto, dados) {
            const leadsKey = `vantix_leads_${produto.id}`;
            const leads = JSON.parse(localStorage.getItem(leadsKey)) || [];
            leads.push({
                id: Date.now(),
                ...dados,
                produto_nome: produto.nome,
                produto_serial: produto.serial,
                data: new Date().toISOString()
            });
            localStorage.setItem(leadsKey, JSON.stringify(leads));
        }

        function mostrarProduto() {
            const { id, hash } = getUrlParams();
            const container = document.getElementById('produto-content');

            if (!id) {
                container.innerHTML = `<div class="error-state"><i class="fas fa-exclamation-triangle"></i><h2>Produto não especificado</h2><button class="btn-back" onclick="window.location.href='e-commerce.html'">Voltar</button></div>`;
                return;
            }

            const produto = produtos.find(p => p.id == id);
            if (!produto) {
                container.innerHTML = `<div class="error-state"><i class="fas fa-exclamation-triangle"></i><h2>Produto não encontrado</h2><button class="btn-back" onclick="window.location.href='e-commerce.html'">Voltar</button></div>`;
                return;
            }

            renderizarProduto(container, produto);
        }

        function renderizarProduto(container, produto) {
            const currentUrl = getCurrentLink();
            const precoFormatado = produto.preco.toLocaleString('pt-MZ', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
            
            const depoText = depoimentosTexto.filter(d => d.produto_id == produto.id);
            const depoImg = depoimentosImagem.filter(d => d.produto_id == produto.id);

            container.innerHTML = `
                <!-- Banner condicional -->
                <div class="banner-container ${!produto.banner ? 'hidden' : ''}">
                    ${produto.banner ? `<img src="${produto.banner}" class="banner-img" alt="Banner">` : ''}
                </div>

                <!-- Contador de Urgência (se ativado) -->
                <div id="urgent-container"></div>

                <div class="produto-card">
                    <div class="produto-main">
                        <div class="produto-imagem">
                            <img src="${produto.imagem}" alt="${produto.nome}">
                        </div>
                        <div class="produto-info">
                            <div class="produto-categoria"><i class="fas fa-tag"></i> ${produto.categoria || 'Produto'}</div>
                            <h1 class="produto-nome">${produto.nome}</h1>
                            <div class="produto-preco">${precoFormatado} MZN</div>
                            <div class="produto-serial"><i class="fas fa-barcode"></i> Série: ${produto.serial}</div>
                            
                            <div class="produto-descricao">
                                <h4><i class="fas fa-info-circle"></i> Descrição</h4>
                                <p>${produto.descricao_curta || 'Sem descrição'}</p>
                                ${produto.descricao_longa ? `<div class="descricao-longa"><h4><i class="fas fa-file-alt"></i> Detalhes</h4><p>${produto.descricao_longa}</p></div>` : ''}
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Depoimentos (acima do formulário) -->
                <div class="depoimentos-section">
                    <div class="section-title"><i class="fas fa-comment-dots"></i> Depoimentos de Clientes</div>
                    
                    <div class="depoimentos-texto">
                        ${depoText.length === 0 ? '<p style="text-align: center; color: rgba(255,255,255,0.4); padding: 20px;">Nenhum depoimento ainda. Seja o primeiro!</p>' : 
                            depoText.map(d => `
                            <div class="depoimento-card">
                                <div class="depoimento-header">
                                    <div class="depoimento-nome"><i class="fas fa-user-circle"></i> ${d.nome}</div>
                                    <div class="stars">${'⭐'.repeat(d.stars)}</div>
                                </div>
                                <div class="depoimento-texto">"${d.texto}"</div>
                                <div class="depoimento-data">${new Date(d.data).toLocaleDateString('pt-MZ')}</div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="section-title" style="margin-top: 32px;"><i class="fas fa-image"></i> Capturas de Conversas</div>
                    <div class="depoimentos-imagem">
                        ${depoImg.length === 0 ? '<p style="text-align: center; color: rgba(255,255,255,0.4); padding: 20px;">Nenhuma imagem de depoimento ainda.</p>' : 
                            depoImg.map(img => `
                            <div class="depoimento-img-card" onclick="openImageModal('${img.imagem}')">
                                <img src="${img.imagem}" class="depoimento-img" alt="Depoimento">
                                <div class="depoimento-img-legenda">${img.legenda || 'Depoimento de cliente'}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <!-- Formulário do Cliente -->
                <div class="produto-card">
                    <div class="form-section">
                        <div class="form-title"><i class="fas fa-user-check"></i> Preencha seus dados para comprar</div>
                        <form id="lead-form">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>NOME COMPLETO *</label>
                                    <input type="text" id="lead-nome" placeholder="Seu nome" required>
                                </div>
                                <div class="form-group">
                                    <label>EMAIL *</label>
                                    <input type="email" id="lead-email" placeholder="seu@email.com" required>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>TELEFONE/WHATSAPP *</label>
                                    <input type="tel" id="lead-telefone" placeholder="84 123 4567" required>
                                </div>
                                <div class="form-group">
                                    <label>ENDEREÇO DE ENTREGA</label>
                                    <input type="text" id="lead-endereco" placeholder="Cidade, bairro, rua...">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>MENSAGEM (opcional)</label>
                                <textarea id="lead-mensagem" rows="2" placeholder="Alguma observação?"></textarea>
                            </div>
                            <button type="submit" class="btn-whatsapp" id="submit-lead">
                                <i class="fab fa-whatsapp"></i> Enviar e Continuar no WhatsApp
                            </button>
                        </form>
                    </div>

                    <div class="link-section">
                        <div class="current-link">
                            <span style="word-break: break-all; flex: 1;">${currentUrl}</span>
                            <button class="btn-copy" onclick="copiarLink()"><i class="fas fa-copy"></i> Copiar</button>
                        </div>
                        <div style="text-align: center; margin-top: 20px;" id="qrcode-container"></div>
                    </div>
                </div>
            `;

            // Contador de urgência
            if (produto.urgent_enabled && produto.urgent_minutes) {
                const urgentContainer = document.getElementById('urgent-container');
                urgentContainer.innerHTML = `
                    <div class="urgent-counter">
                        <div class="urgent-text">⚠️ OFERTA POR TEMPO LIMITADO ⚠️</div>
                        <div class="urgent-timer" id="urgent-timer">--:--</div>
                        <div class="urgent-text" style="font-size: 12px;">minutos:segundos restantes</div>
                    </div>
                `;
                if (urgentInterval) clearInterval(urgentInterval);
                urgentInterval = startUrgentCounter(produto);
            }

            // QR Code
            setTimeout(() => {
                const qrContainer = document.getElementById('qrcode-container');
                if (qrContainer && typeof QRCode !== 'undefined') {
                    qrContainer.innerHTML = '';
                    new QRCode(qrContainer, { text: currentUrl, width: 120, height: 120 });
                }
            }, 100);

            // Evento do formulário
            const form = document.getElementById('lead-form');
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                
                const nome = document.getElementById('lead-nome').value.trim();
                const email = document.getElementById('lead-email').value.trim();
                const telefone = document.getElementById('lead-telefone').value.trim();
                const endereco = document.getElementById('lead-endereco').value.trim();
                const mensagem = document.getElementById('lead-mensagem').value.trim();

                if (!nome || !email || !telefone) {
                    alert('Preencha nome, email e telefone');
                    return;
                }

                salvarLead(produto, { nome, email, telefone, endereco, mensagem });

                const whatsappMsg = `*NOVO PEDIDO - VANTIX*%0A%0A` +
                    `*Produto:* ${produto.nome}%0A` +
                    `*Série:* ${produto.serial}%0A` +
                    `*Preço:* ${precoFormatado} MZN%0A%0A` +
                    `*Dados do Cliente:*%0A` +
                    `Nome: ${nome}%0A` +
                    `Email: ${email}%0A` +
                    `Telefone: ${telefone}%0A` +
                    `Endereço: ${endereco || 'Não informado'}%0A%0A` +
                    `*Mensagem:* ${mensagem || 'Sem mensagem adicional'}`;

                const whatsappUrl = `https://wa.me/${produto.vendedor_contacto.replace(/\D/g, '')}?text=${whatsappMsg}`;
                window.open(whatsappUrl, '_blank');
                alert('✅ Dados enviados! Redirecionando para WhatsApp...');
            });
        }

        function copiarLink() {
            navigator.clipboard.writeText(window.location.href);
            alert('✅ Link copiado!');
        }

        function openImageModal(src) {
            const modal = document.getElementById('image-modal');
            document.getElementById('modal-image').src = src;
            modal.classList.add('show');
        }

        function closeModal() {
            document.getElementById('image-modal').classList.remove('show');
        }

        mostrarProduto();
    </script>
</body>
            </html>
