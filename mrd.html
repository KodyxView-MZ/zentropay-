<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZentroPay — Modo Kodyx</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Grade futurista de fundo */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }

        .container {
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 2;
        }

        /* Glassmorphism líquido */
        .glass-panel {
            background: rgba(18, 18, 24, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 40px 32px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #a0a0c0 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .logo h1 span {
            font-weight: 300;
            background: linear-gradient(135deg, #6b6b8d 0%, #3a3a5a 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .tagline {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.35);
            margin-top: 8px;
        }

        .tabs {
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.3);
            padding: 5px;
            border-radius: 60px;
            margin-bottom: 32px;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 0;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            border-radius: 40px;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: rgba(255,255,255,0.1);
            color: white;
            backdrop-filter: blur(4px);
        }

        .form-container {
            display: none;
            animation: fadeIn 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .form-container.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 0;
            background: transparent;
            border: none;
            border-bottom: 1.5px solid rgba(255,255,255,0.15);
            font-size: 15px;
            color: white;
            outline: none;
            transition: 0.2s;
        }

        .input-group input:focus {
            border-bottom-color: rgba(255,255,255,0.7);
        }

        .input-group input::placeholder {
            color: rgba(255,255,255,0.2);
            font-weight: 300;
        }

        /* Botão líquido escuro refinado */
        .btn-liquid-premium {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            border: none;
            border-radius: 40px;
            background: linear-gradient(90deg, #1a1a24 0%, #0d0d14 100%);
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.2s;
            border: 0.5px solid rgba(255,255,255,0.1);
        }

        .btn-liquid-premium::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: translateX(-100%);
            transition: 0.6s;
        }

        .btn-liquid-premium:hover::after {
            transform: translateX(100%);
        }

        .btn-liquid-premium:hover {
            background: linear-gradient(90deg, #2a2a38 0%, #1a1a24 100%);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .footer-note {
            text-align: center;
            margin-top: 32px;
            font-size: 11px;
            color: rgba(255,255,255,0.25);
            letter-spacing: 0.5px;
        }

        .footer-note a {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-weight: 500;
        }

        .message {
            margin-top: 16px;
            font-size: 12px;
            text-align: center;
            padding: 8px;
            border-radius: 40px;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.error {
            background: rgba(255,59,48,0.15);
            color: #ff6b62;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-panel">
            <div class="logo-area">
                <div class="logo">
                    <h1>Zentro<span>Pay</span></h1>
                </div>
                <p class="tagline">encrypted • private</p>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('login')">⟡ entrar</button>
                <button class="tab-btn" onclick="switchTab('cadastro')">⟡ criar</button>
            </div>

            <div id="login-container" class="form-container active">
                <form onsubmit="handleAuth(event, 'login')">
                    <div class="input-group">
                        <label>E-MAIL</label>
                        <input type="email" placeholder="vantix.mz@gmail.com" required>
                    </div>
                    <div class="input-group">
                        <label>SENHA</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-liquid-premium">ACESSAR PAINEL →</button>
                    <div class="message" id="login-error"></div>
                </form>
            </div>

            <div id="cadastro-container" class="form-container">
                <form onsubmit="handleAuth(event, 'cadastro')">
                    <div class="input-group">
                        <label>NOME</label>
                        <input type="text" placeholder="identidade" required>
                    </div>
                    <div class="input-group">
                        <label>E-MAIL</label>
                        <input type="email" placeholder="contato@zentro.com" required>
                    </div>
                    <div class="input-group">
                        <label>SENHA</label>
                        <input type="password" placeholder="mínimo 6 caracteres" required>
                    </div>
                    <button type="submit" class="btn-liquid-premium">CRIAR CONTA →</button>
                    <div class="message" id="cadastro-error"></div>
                </form>
            </div>

            <div class="footer-note">
                <p>✦ Kodyx secure layer ✦</p>
            </div>
        </div>
    </div>

    <script>
        let usuarios = JSON.parse(localStorage.getItem('zentro_users')) || [];

        function switchTab(type) {
            const tabs = document.querySelectorAll('.tab-btn');
            const loginDiv = document.getElementById('login-container');
            const cadastroDiv = document.getElementById('cadastro-container');
            
            tabs.forEach(t => t.classList.remove('active'));
            loginDiv.classList.remove('active');
            cadastroDiv.classList.remove('active');

            if(type === 'login') {
                tabs[0].classList.add('active');
                loginDiv.classList.add('active');
            } else {
                tabs[1].classList.add('active');
                cadastroDiv.classList.add('active');
            }
            
            document.querySelectorAll('.message').forEach(m => {
                m.classList.remove('show');
                m.innerText = '';
            });
        }

        function showMessage(elementId, text, isError = true) {
            const msg = document.getElementById(elementId);
            msg.innerText = text;
            msg.classList.add('show');
            if(isError) msg.classList.add('error');
            setTimeout(() => msg.classList.remove('show'), 2800);
        }

        function handleAuth(e, mode) {
            e.preventDefault();
            const form = e.target;
            const inputs = form.querySelectorAll('input');
            const btn = form.querySelector('button');
            const originalText = btn.innerText;
            
            btn.innerText = '⏳ processando...';
            btn.style.opacity = '0.6';

            setTimeout(() => {
                if(mode === 'cadastro') {
                    const nome = inputs[0].value.trim();
                    const email = inputs[1].value.trim();
                    const senha = inputs[2].value;
                    
                    if(!nome || !email || !senha) {
                        showMessage('cadastro-error', 'preencha todos os campos');
                        btn.innerText = originalText;
                        btn.style.opacity = '1';
                        return;
                    }
                    if(senha.length < 6) {
                        showMessage('cadastro-error', 'senha deve ter 6+ caracteres');
                        btn.innerText = originalText;
                        btn.style.opacity = '1';
                        return;
                    }
                    if(usuarios.find(u => u.email === email)) {
                        showMessage('cadastro-error', 'email já cadastrado');
                        btn.innerText = originalText;
                        btn.style.opacity = '1';
                        return;
                    }
                    
                    usuarios.push({ id: Date.now(), nome, email, senha });
                    localStorage.setItem('zentro_users', JSON.stringify(usuarios));
                    showMessage('cadastro-error', '✓ conta criada! faça login', true);
                    form.reset();
                    setTimeout(() => switchTab('login'), 1300);
                    
                } else {
                    const email = inputs[0].value.trim();
                    const senha = inputs[1].value;
                    const user = usuarios.find(u => u.email === email && u.senha === senha);
                    
                    if(user) {
                        showMessage('login-error', `✨ bem-vindo, ${user.nome} ✨`, true);
                        localStorage.setItem('zentro_session', JSON.stringify({ nome: user.nome, email: user.email }));
                        setTimeout(() => alert('🔐 redirecionando para dashboard segura'), 800);
                    } else {
                        showMessage('login-error', 'credenciais inválidas');
                    }
                }
                
                btn.innerText = originalText;
                btn.style.opacity = '1';
            }, 800);
        }
    </script>
</body>
</html>
